<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Rebill or Not Rebill? | Sterling Specialty</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2316a34a%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><rect x=%223%22 y=%224%22 width=%2218%22 height=%2218%22 rx=%222%22 ry=%222%22></rect><line x1=%2216%22 y1=%222%22 x2=%2216%22 y2=%226%22></line><line x1=%228%22 y1=%222%22 x2=%228%22 y2=%226%22></line><line x1=%223%22 y1=%2210%22 x2=%2221%22 y2=%2210%22></line><path d=%22M9 16l2 2 4-4%22></path></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class' 
        }
    </script>
    <script>
        // FOUC Prevention & Theme Memory Check
        if (localStorage.getItem('ssp-theme') === 'dark') { 
            document.documentElement.classList.add('dark'); 
        }
    </script>
    
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        
        /* Custom Toggle Pill Styling */
        .toggle-checkbox:checked { right: 0; border-color: #16a34a; }
        .toggle-checkbox:checked + .toggle-label { background-color: #16a34a; }

        /* Dark mode date picker icon fix */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
        }
        .dark input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="w-full p-4 flex justify-between items-center">
        <div></div> 
        
        <div class="flex items-center">
            <span class="mr-2 text-sm text-gray-500 dark:text-gray-400">Dark Mode</span>
            <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="darkModeToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-300 z-10 top-0 bottom-0 m-auto right-4"/>
                <label for="darkModeToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-4 w-full">
        
        <header class="mb-8 text-center w-full max-w-md mt-6">
            <h1 class="text-3xl font-bold tracking-tight mb-2">To Rebill or Not Rebill?</h1>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Sterling Specialty Pharmacy Internal Tool <span class="text-xs opacity-50 ml-1">v1.2.0</span></p>
        </header>

        <main class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow max-w-md w-full p-6">
            
            <div class="mb-6">
                <label for="dispenseDate" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">
                    Enter Dispense Date - add from the prescription
                </label>
                <div class="relative">
                    <input 
                        type="date" 
                        id="dispenseDate" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all shadow-sm"
                    >
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                    Ship Date = Dispense Date + 7
                </p>
            </div>

            <div id="resultBox" class="hidden mt-6 rounded-lg p-4 border transition-all duration-300">
            </div>

        </main>
    </div>

    <footer class="mt-12 text-gray-400 text-xs text-center pb-6 w-full">
        <p>&copy; <span id="currentYear"></span> Sterling Specialty Pharmacy. Internal Use Only.</p>
    </footer>

    <script>
        // Set dynamic copyright year
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Dark Mode Toggle Logic
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');

        const isDarkMode = localStorage.getItem('ssp-theme') === 'dark' || 
                           (!('ssp-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (isDarkMode) {
            htmlElement.classList.add('dark');
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        // Application State & DOM Elements
        const dateInput = document.getElementById('dispenseDate');
        const resultBox = document.getElementById('resultBox');

        // SVG Icons
        const successIcon = `<svg class="w-6 h-6 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        const warningIcon = `<svg class="w-6 h-6 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
        const amberAlertIcon = `<svg class="w-6 h-6 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

        // Event Listener triggers calculation on date input change
        dateInput.addEventListener('input', calculateShipping);

        // Core Logic for Calculating Shipping Validity
        function calculateShipping() {
            if (!dateInput.value) {
                resultBox.className = 'hidden mt-6 rounded-lg p-4 border transition-all duration-300';
                resultBox.innerHTML = '';
                return;
            }

            // Parse dispense date safely based on local time
            const [year, month, day] = dateInput.value.split('-');
            const dispenseDate = new Date(year, month - 1, day);
            dispenseDate.setHours(0, 0, 0, 0); // Normalize to midnight

            // Get today's date normalized to midnight for accurate day-to-day comparison
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Establish Outlier Limits
            const futureLimit = new Date(today);
            futureLimit.setDate(today.getDate() + 1);

            const pastLimit = new Date(today);
            pastLimit.setDate(today.getDate() - 180);

            // Reset UI classes to base state before applying new dynamic classes
            resultBox.className = 'mt-6 rounded-lg p-4 border transition-all duration-300 block';

            // 1. The Intercept (Validation Check)
            if (dispenseDate > futureLimit || dispenseDate < pastLimit) {
                // AMBER WARNING STATE (Halts calculation)
                resultBox.classList.add('bg-amber-50', 'dark:bg-amber-900/30', 'border-amber-200', 'dark:border-amber-800', 'text-amber-800', 'dark:text-amber-300');
                
                // Inject exact typography requirements
                resultBox.innerHTML = `
                    <div class="flex items-start">
                        ${amberAlertIcon}
                        <div class="flex flex-col">
                            <span class="text-xs font-black uppercase tracking-widest">ERROR!</span>
                            <span class="text-[10px] font-semibold mt-1">Check your date and try again</span>
                            <span class="text-[9px] italic opacity-80 mt-1">This is not a time machine.</span>
                        </div>
                    </div>
                `;
                return; // Exit function completely
            }

            // 2. Standard Calculation (Proceeds only if date is valid)
            const shipDate = new Date(dispenseDate);
            shipDate.setDate(shipDate.getDate() + 7);

            // Logic Assessment: Determine Output State
            if (shipDate >= today) {
                // SUCCESS STATE (Okay to ship)
                resultBox.classList.add('bg-green-50', 'dark:bg-green-900/30', 'border-green-200', 'dark:border-green-800', 'text-green-800', 'dark:text-green-300');
                
                resultBox.innerHTML = `
                    <div class="flex items-center mb-2">
                        ${successIcon}
                        <h2 class="text-lg font-bold">Okay to ship!</h2>
                    </div>
                    <p class="text-sm opacity-90">Meets Shipping Timeline - no rebill needed.<br>Go forth and schedule.</p>
                `;
            } else {
                // WARNING STATE (Rebill required)
                resultBox.classList.add('bg-red-50', 'dark:bg-red-900/30', 'border-red-200', 'dark:border-red-800', 'text-red-800', 'dark:text-red-300');
                
                resultBox.innerHTML = `
                    <div class="flex items-center mb-2">
                        ${warningIcon}
                        <h2 class="text-lg font-bold">Warning! Does NOT meet the shipping timeline!</h2>
                    </div>
                    <p class="text-sm opacity-90"> Rebill the prescription. Change the dispense date to today's date, then schedule like normal.</p>
                `;
            }
        }
    </script>
</body>
</html>
