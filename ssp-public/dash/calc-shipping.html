<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Calculator | SSP OS</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='2' width='16' height='20' rx='2' ry='2'/%3E%3Cline x1='8' y1='6' x2='16' y2='6'/%3E%3Cline x1='16' y1='14' x2='16' y2='18'/%3E%3Cpath d='M16 10h.01'/%3E%3Cpath d='M12 10h.01'/%3E%3Cpath d='M8 10h.01'/%3E%3Cpath d='M12 14h.01'/%3E%3Cpath d='M8 14h.01'/%3E%3Cpath d='M12 18h.01'/%3E%3Cpath d='M8 18h.01'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <script>
        if (localStorage.getItem('ssp-theme') === 'dark' || (!localStorage.getItem('ssp-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { 
            document.documentElement.classList.add('dark'); 
        }
    </script>

    <style>
        /* SSP Cupertino 2050 Design Tolerances */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        html.dark {
            --glass-bg: rgba(20, 20, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .preload * { transition: none !important; }
        
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        
        /* Spring Physics */
        .spring-transition { transition: all 0.5s var(--spring); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
        .dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dynamic ambient background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.03), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.03), transparent 25%);
        }
        .dark .ambient-bg {
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.08), transparent 25%);
        }
    </style>
</head>
<body class="preload bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="ambient-bg transition-colors duration-500"></div>

    <div class="flex-1 flex flex-col items-center px-4 pt-10 pb-12 w-full z-10">

        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-50 tracking-tight spring-transition">Shipping Calculator</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Sterling Specialty Pharmacy Internal Tool</p>
        </header>

        <main class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl border border-gray-200 dark:border-gray-700 rounded-2xl shadow-lg max-w-md w-full overflow-hidden relative">
            <div class="p-8 flex flex-col h-full">
                
                <div class="mb-6 mt-2">
                    <div class="mb-6">
                        <label for="ship-dispenseDate" class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">
                            Enter Dispense Date
                        </label>
                        <div class="relative">
                            <input 
                                type="date" 
                                id="ship-dispenseDate" 
                                class="w-full px-4 py-4 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all shadow-sm text-lg font-medium"
                            >
                        </div>
                        <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-3 uppercase tracking-widest opacity-80 text-center">
                            Logic: Ship Date = Dispense Date + 7
                        </p>
                    </div>

                    <div id="ship-resultBox" class="hidden mt-8 rounded-xl p-5 border transition-all duration-300 shadow-sm">
                    </div>
                </div>

                <div class="mt-auto pt-6">
                    <div class="flex justify-center border-t border-gray-100 dark:border-gray-700 pt-5 transition-colors">
                        <button onclick="resetShipping()" class="text-xs font-bold text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors uppercase tracking-widest focus:outline-none">Reset Data</button>
                    </div>
                </div>

            </div>
        </main>

    </div>

    <script>
        window.addEventListener('load', () => document.body.classList.remove('preload'));

        // ==========================================
        // SHIPPING CALCULATOR LOGIC
        // ==========================================
        const shipDateInput = document.getElementById('ship-dispenseDate');
        const shipResultBox = document.getElementById('ship-resultBox');

        const ship_successIcon = `<svg class="w-8 h-8 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        const ship_warningIcon = `<svg class="w-8 h-8 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
        const ship_amberAlertIcon = `<svg class="w-8 h-8 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

        // Bind both input and change for cross-browser calendar reliability
        shipDateInput.addEventListener('input', calculateShipping);
        shipDateInput.addEventListener('change', calculateShipping);

        function calculateShipping() {
            if (!shipDateInput.value) {
                shipResultBox.className = 'hidden mt-8 rounded-xl p-5 border transition-all duration-300 shadow-sm';
                shipResultBox.innerHTML = '';
                return;
            }

            // Establish base visible classes (removing 'hidden')
            shipResultBox.className = 'mt-8 rounded-xl p-5 border transition-all duration-300 shadow-sm block';

            // Timezone safe extraction
            const [year, month, day] = shipDateInput.value.split('-');
            const dispenseDate = new Date(year, month - 1, day);
            dispenseDate.setHours(0, 0, 0, 0); 

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Boundary Definitions
            const futureLimit = new Date(today);
            futureLimit.setDate(today.getDate() + 1); 

            const pastLimit = new Date(today);
            pastLimit.setDate(today.getDate() - 180); 

            if (dispenseDate > futureLimit || dispenseDate < pastLimit) {
                shipResultBox.classList.add('bg-amber-50', 'dark:bg-amber-900/30', 'border-amber-200', 'dark:border-amber-800', 'text-amber-800', 'dark:text-amber-300');
                shipResultBox.innerHTML = `
                    <div class="flex items-start">
                        ${ship_amberAlertIcon}
                        <div class="flex flex-col">
                            <span class="text-xs font-black uppercase tracking-widest">IMPOSSIBLE DATE</span>
                            <span class="text-sm font-semibold mt-1">Check your input and try again</span>
                            <span class="text-[10px] italic opacity-80 mt-1">Dispense date is outside allowable threshold.</span>
                        </div>
                    </div>
                `;
                return; 
            }

            const shipDate = new Date(dispenseDate);
            shipDate.setDate(shipDate.getDate() + 7);

            if (shipDate >= today) {
                shipResultBox.classList.add('bg-green-50', 'dark:bg-green-900/30', 'border-green-200', 'dark:border-green-800', 'text-green-800', 'dark:text-green-300');
                shipResultBox.innerHTML = `
                    <div class="flex items-center mb-3">
                        ${ship_successIcon}
                        <h2 class="text-xl font-bold tracking-tight">Okay to ship!</h2>
                    </div>
                    <p class="text-sm opacity-90 pl-11">Meets Shipping Timeline. No rebill needed.<br>Go forth and schedule.</p>
                `;
            } else {
                shipResultBox.classList.add('bg-red-50', 'dark:bg-red-900/30', 'border-red-200', 'dark:border-red-800', 'text-red-800', 'dark:text-red-300');
                shipResultBox.innerHTML = `
                    <div class="flex items-center mb-3">
                        ${ship_warningIcon}
                        <h2 class="text-xl font-bold tracking-tight leading-tight">Does NOT meet<br>timeline!</h2>
                    </div>
                    <p class="text-sm opacity-90 pl-11">Rebill the prescription. Change the dispense date to today's date, then schedule like normal.</p>
                `;
            }
        }

        function resetShipping() {
            shipDateInput.value = '';
            calculateShipping();
        }
    </script>
</body>
</html>
