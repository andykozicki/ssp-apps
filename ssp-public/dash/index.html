<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc Dashboard | SSP</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='2' width='16' height='20' rx='2' ry='2'/%3E%3Cline x1='8' y1='6' x2='16' y2='6'/%3E%3Cline x1='16' y1='14' x2='16' y2='18'/%3E%3Cpath d='M16 10h.01'/%3E%3Cpath d='M12 10h.01'/%3E%3Cpath d='M8 10h.01'/%3E%3Cpath d='M12 14h.01'/%3E%3Cpath d='M8 14h.01'/%3E%3Cpath d='M12 18h.01'/%3E%3Cpath d='M8 18h.01'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <script>
        if (localStorage.getItem('ssp-theme') === 'dark' || (!localStorage.getItem('ssp-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { 
            document.documentElement.classList.add('dark'); 
            localStorage.setItem('ssp-theme', 'dark');
        } else {
            localStorage.setItem('ssp-theme', 'light');
        }
    </script>

    <style>
        /* SSP Cupertino 2050 Design Tolerances */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        html.dark {
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; }
        .preload * { transition: none !important; }
        
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        .sterling-blue { color: #005eb8; }
        
        /* Accordion Physics */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s var(--spring), opacity 0.3s ease;
            opacity: 0;
        }
        .accordion-content.expanded {
            max-height: 400px;
            opacity: 1;
        }
        .accordion-icon { transition: transform 0.3s var(--spring); }
        .accordion-btn[aria-expanded="true"] .accordion-icon { transform: rotate(180deg); }

        /* Dynamic ambient background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.03), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.03), transparent 25%);
        }
        .dark .ambient-bg {
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.08), transparent 25%);
        }

        /* Seamless Iframe Setup */
        iframe { border: none; width: 100%; height: 100%; display: block; background: transparent; }
        
        /* Sidebar Collapse Physics */
        #sidebar { transition: width 0.4s var(--spring); }
    </style>
</head>
<body class="preload bg-gray-50 dark:bg-gray-900 h-screen w-screen flex text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="ambient-bg transition-colors duration-500"></div>

    <aside id="sidebar" class="w-72 overflow-hidden flex-shrink-0 flex flex-col border-r border-gray-200 dark:border-gray-800 bg-white/40 dark:bg-black/20 backdrop-blur-3xl z-20 transition-colors relative shadow-[10px_0_30px_-10px_rgba(0,0,0,0.05)] dark:shadow-[10px_0_30px_-10px_rgba(0,0,0,0.5)]">
        
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto py-4 px-3 space-y-2 mt-4 w-72">
            <div class="animate-pulse space-y-3">
                <div class="h-8 bg-gray-200 dark:bg-gray-800 rounded mx-2"></div>
                <div class="h-10 bg-gray-200 dark:bg-gray-800 rounded mx-4"></div>
                <div class="h-10 bg-gray-200 dark:bg-gray-800 rounded mx-4"></div>
            </div>
        </nav>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800 text-[9px] font-mono text-gray-400 text-center uppercase tracking-widest w-72">
            V3.2.2 &copy; <span id="year"></span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative z-10 min-w-0">
        
        <header class="h-20 bg-white/40 dark:bg-black/20 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 flex justify-between items-center px-6 transition-colors duration-300 relative">
            
            <button id="sidebarToggle" class="p-2 -ml-2 text-gray-500 hover:text-gray-900 dark:hover:text-white rounded-lg transition-colors focus:outline-none active:scale-95 z-10 relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <div class="absolute left-1/2 transform -translate-x-1/2 flex flex-col items-center justify-center">
                <div class="flex bg-gray-100 dark:bg-gray-800 rounded-lg p-0.5 mb-1.5 shadow-sm border border-black/5 dark:border-white/5">
                    <button id="btn-prev" class="p-1 text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-white dark:hover:bg-gray-700 rounded shadow-sm opacity-50 cursor-not-allowed transition-all focus:outline-none disabled:opacity-30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <button id="btn-next" class="p-1 text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-white dark:hover:bg-gray-700 rounded shadow-sm transition-all focus:outline-none ml-1 disabled:opacity-30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <h1 id="header-title" class="text-[11px] font-bold text-gray-800 dark:text-gray-200 tracking-widest uppercase font-mono">Initializing Hub...</h1>
            </div>

            <div class="flex items-center gap-3 z-10 relative">
                <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider hidden sm:block">Light / Dark</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="themeToggle" class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-sterling-green"></div>
                </label>
            </div>
        </header>

        <div class="flex-1 w-full relative bg-transparent overflow-hidden">
            <div id="loader" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300 pointer-events-none z-10">
                <div class="w-8 h-8 border-4 border-gray-200 border-t-sterling-green rounded-full animate-spin"></div>
            </div>
            
            <iframe id="app-frame" class="w-full h-full absolute inset-0 transition-opacity duration-300"></iframe>
        </div>

    </main>

    <script>
        window.addEventListener('load', () => document.body.classList.remove('preload'));
        document.getElementById('year').textContent = new Date().getFullYear();

        // ==========================================
        // UI & LAYOUT CONTROLS
        // ==========================================
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        
        sidebarToggle.addEventListener('click', () => {
            if (sidebar.classList.contains('w-72')) {
                sidebar.classList.remove('w-72');
                sidebar.classList.add('w-0');
            } else {
                sidebar.classList.remove('w-0');
                sidebar.classList.add('w-72');
            }
        });

        // ==========================================
        // OS ROUTING & STATE MANAGEMENT
        // ==========================================
        const sidebarNav = document.getElementById('sidebar-nav');
        const headerTitle = document.getElementById('header-title');
        const appFrame = document.getElementById('app-frame');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const themeToggle = document.getElementById('themeToggle');
        const loader = document.getElementById('loader');

        let masterAppList = [];
        let currentIndex = -1;

        async function bootOS() {
            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(`ssp-manifest.json?v=${cacheBuster}`);
                if (!response.ok) throw new Error('Manifest fetch returned non-200 status');
                
                masterAppList = await response.json();
                renderSidebar();
                
                if (masterAppList.length > 0) {
                    loadApp(0);
                }
            } catch (error) {
                console.error("OS Boot Failure:", error);
                headerTitle.textContent = "System Error: Missing Manifest";
                loader.style.opacity = '0';
            }
        }

        function renderSidebar() {
            sidebarNav.innerHTML = '';
            
            const groups = {};
            masterAppList.forEach((app, index) => {
                app.flatIndex = index;
                // Category is now dynamically extracted from the JSON file
                const cat = app.category || 'General Tools';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(app);
            });

            Object.entries(groups).forEach(([category, apps], groupIndex) => {
                const isFirstGroup = groupIndex === 0;
                
                const groupDiv = document.createElement('div');
                groupDiv.className = 'mb-1';
                
                const btn = document.createElement('button');
                btn.className = 'accordion-btn w-full flex items-center justify-between px-3 py-2 text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest hover:text-gray-700 dark:hover:text-gray-300 transition-colors focus:outline-none';
                btn.setAttribute('aria-expanded', isFirstGroup ? 'true' : 'false');
                btn.innerHTML = `
                    <span>${category}</span>
                    <svg class="w-3 h-3 accordion-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                `;

                const content = document.createElement('div');
                content.className = `accordion-content mt-1 space-y-1 ${isFirstGroup ? 'expanded' : ''}`;
                
                apps.forEach(app => {
                    const tab = document.createElement('button');
                    tab.id = `tab-${app.flatIndex}`;
                    tab.className = 'w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 text-left focus:outline-none group ' + 
                                  'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800/50 hover:text-gray-900 dark:hover:text-white';
                    
                    tab.innerHTML = `
                        <div class="text-gray-400 group-hover:text-sterling-green transition-colors scale-75 transform origin-left flex-shrink-0">${app.icon}</div>
                        <span class="truncate">${app.name}</span>
                    `;
                    
                    tab.onclick = () => loadApp(app.flatIndex);
                    content.appendChild(tab);
                });

                btn.onclick = () => {
                    const isExpanded = btn.getAttribute('aria-expanded') === 'true';
                    btn.setAttribute('aria-expanded', !isExpanded);
                    if (isExpanded) {
                        content.classList.remove('expanded');
                    } else {
                        content.classList.add('expanded');
                    }
                };

                groupDiv.appendChild(btn);
                groupDiv.appendChild(content);
                sidebarNav.appendChild(groupDiv);
            });
        }

        function loadApp(index) {
            if (index < 0 || index >= masterAppList.length) return;
            
            currentIndex = index;
            const app = masterAppList[currentIndex];
            
            headerTitle.textContent = app.name;
            updateTabStates();
            updateArrowStates();

            // Expand parent accordion naturally if it is collapsed
            const activeTab = document.getElementById(`tab-${currentIndex}`);
            if (activeTab) {
                const parentContent = activeTab.closest('.accordion-content');
                const parentBtn = parentContent.previousElementSibling;
                if (!parentContent.classList.contains('expanded')) {
                    parentBtn.setAttribute('aria-expanded', 'true');
                    parentContent.classList.add('expanded');
                }
            }

            loader.style.opacity = '1';
            appFrame.style.opacity = '0.5';
            
            const v = new Date().getTime();
            appFrame.src = `${app.file}?v=${v}`;
        }

        btnPrev.onclick = () => loadApp(currentIndex - 1);
        btnNext.onclick = () => loadApp(currentIndex + 1);

        function updateTabStates() {
            document.querySelectorAll('[id^="tab-"]').forEach(t => {
                t.classList.remove('bg-white', 'dark:bg-gray-800', 'shadow-sm', 'text-gray-900', 'dark:text-white', 'border', 'border-gray-200', 'dark:border-gray-700');
                t.classList.add('text-gray-600', 'dark:text-gray-300', 'border-transparent');
                
                const iconContainer = t.querySelector('div');
                iconContainer.classList.remove('text-sterling-green');
                iconContainer.classList.add('text-gray-400');
            });

            const activeTab = document.getElementById(`tab-${currentIndex}`);
            if (activeTab) {
                activeTab.classList.remove('text-gray-600', 'dark:text-gray-300', 'border-transparent');
                activeTab.classList.add('bg-white', 'dark:bg-gray-800', 'shadow-sm', 'text-gray-900', 'dark:text-white', 'border', 'border-gray-200', 'dark:border-gray-700');
                
                const iconContainer = activeTab.querySelector('div');
                iconContainer.classList.remove('text-gray-400');
                iconContainer.classList.add('text-sterling-green');
            }
        }

        function updateArrowStates() {
            btnPrev.disabled = currentIndex <= 0;
            btnNext.disabled = currentIndex >= masterAppList.length - 1;
            
            if(btnPrev.disabled) {
                btnPrev.classList.add('opacity-30', 'cursor-not-allowed');
                btnPrev.classList.remove('hover:bg-white', 'dark:hover:bg-gray-700');
            } else {
                btnPrev.classList.remove('opacity-30', 'cursor-not-allowed');
                btnPrev.classList.add('hover:bg-white', 'dark:hover:bg-gray-700');
            }

            if(btnNext.disabled) {
                btnNext.classList.add('opacity-30', 'cursor-not-allowed');
                btnNext.classList.remove('hover:bg-white', 'dark:hover:bg-gray-700');
            } else {
                btnNext.classList.remove('opacity-30', 'cursor-not-allowed');
                btnNext.classList.add('hover:bg-white', 'dark:hover:bg-gray-700');
            }
        }

        // Iframe load listener (Sanitized: NO DOM HACKING to prevent CORS crash)
        appFrame.addEventListener('load', () => {
            loader.style.opacity = '0';
            appFrame.style.opacity = '1';
        });

        // Theme Listener (Local storage sync only)
        const htmlElement = document.documentElement;
        if (htmlElement.classList.contains('dark')) themeToggle.checked = true;

        themeToggle.addEventListener('change', (e) => {
            const isDark = e.target.checked;
            if (isDark) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
            // Child apps will read localStorage on load. Refresh iframe to catch theme change.
            if(currentIndex >= 0) {
                const app = masterAppList[currentIndex];
                const v = new Date().getTime();
                appFrame.src = `${app.file}?v=${v}`;
            }
        });

        // Ignite the OS Router
        bootOS();

    </script>
</body>
</html>
