<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Tool Hub | SSP</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='2' width='16' height='20' rx='2' ry='2'/%3E%3Cline x1='8' y1='6' x2='16' y2='6'/%3E%3Cline x1='16' y1='14' x2='16' y2='18'/%3E%3Cpath d='M16 10h.01'/%3E%3Cpath d='M12 10h.01'/%3E%3Cpath d='M8 10h.01'/%3E%3Cpath d='M12 14h.01'/%3E%3Cpath d='M8 14h.01'/%3E%3Cpath d='M12 18h.01'/%3E%3Cpath d='M8 18h.01'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <script>
        if (localStorage.getItem('ssp-theme') === 'dark' || (!localStorage.getItem('ssp-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { 
            document.documentElement.classList.add('dark'); 
            localStorage.setItem('ssp-theme', 'dark');
        } else {
            localStorage.setItem('ssp-theme', 'light');
        }
    </script>

    <style>
        /* SSP Cupertino 2050 Design Tolerances */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shine: rgba(22, 163, 74, 0.05); /* Sterling Green subtle shine */
            --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        
        html.dark {
            --glass-bg: rgba(20, 20, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shine: rgba(22, 163, 74, 0.15); /* Sterling Green bold shine */
            --glass-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        /* Preload mitigation to kill layout flashes */
        .preload * { transition: none !important; }
        
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        .sterling-blue { color: #005eb8; }
        
        /* Smart Glass Tile Physics Engine */
        .app-tile {
            position: relative;
            overflow: hidden;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 2rem;
            backdrop-filter: blur(24px); /* backdrop-blur-3xl equiv */
            -webkit-backdrop-filter: blur(24px);
            transition: transform 0.5s var(--spring), box-shadow 0.5s var(--spring), border-color 0.3s ease;
            cursor: pointer;
        }

        /* The localized dynamic radial-gradient shine */
        .app-tile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x) var(--mouse-y), var(--glass-shine), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 0;
        }

        .app-tile:hover::before {
            opacity: 1;
        }

        .app-tile:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(22, 163, 74, 0.3); /* Subtle green border pop on hover */
        }
        
        .app-tile:active {
            transform: translateY(2px) scale(0.98);
            transition: transform 0.1s ease;
        }

        /* Protect inner content from gradient overlay */
        .app-tile > * {
            position: relative;
            z-index: 1;
        }
        
        /* Dynamic ambient background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.03), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.03), transparent 25%);
        }
        .dark .ambient-bg {
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.08), transparent 25%);
        }
    </style>
</head>
<body class="preload bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="ambient-bg transition-colors duration-500"></div>

    <div class="w-full px-6 py-4 flex justify-between items-center z-50 bg-white/40 dark:bg-black/40 backdrop-blur-2xl border-b border-black/5 dark:border-white/5 sticky top-0 transition-colors duration-300">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sterling-green" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
            <span class="font-bold text-sm tracking-widest uppercase opacity-80">SSP OS</span>
        </div>

        <div class="flex items-center gap-3">
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Light / Dark</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="themeToggle" class="sr-only peer">
                <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-sterling-green"></div>
            </label>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center w-full px-6 py-12 lg:py-20 z-10">
        
        <header class="mb-16 text-center">
            <h1 class="text-5xl font-light text-gray-900 dark:text-white tracking-tight mb-4">Clinical Tool Hub</h1>
            <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-sterling-green font-semibold">Sterling Specialty Pharmacy OS</p>
        </header>

        <div id="os-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl">
            <div class="animate-pulse app-tile p-8 h-48 flex flex-col justify-center">
                <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-full mb-4"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
            </div>
            <div class="animate-pulse app-tile p-8 h-48 flex flex-col justify-center hidden sm:flex">
                <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-full mb-4"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
            </div>
            <div class="animate-pulse app-tile p-8 h-48 flex flex-col justify-center hidden lg:flex">
                <div class="w-12 h-12 bg-gray-200 dark:bg-gray-700 rounded-full mb-4"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
            </div>
        </div>

    </main>

    <footer class="py-6 text-gray-400 dark:text-gray-500 font-mono text-[10px] tracking-widest text-center w-full z-10 border-t border-gray-200 dark:border-gray-800">
        <p>BUILD V3.1.0 &copy; <span id="year"></span> SSP INTERNAL USE ONLY</p>
    </footer>

    <script>
        // Phase 5 Anti-FOUC execution
        window.addEventListener('load', () => document.body.classList.remove('preload'));

        // ==========================================
        // UI & THEME SYNCHRONIZATION
        // ==========================================
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        
        if (htmlElement.classList.contains('dark')) {
            themeToggle.checked = true;
        }

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        document.getElementById('year').textContent = new Date().getFullYear();

        // ==========================================
        // OS ROUTER & GRID RENDERER
        // ==========================================
        const gridContainer = document.getElementById('os-grid');

        // Fetch the DNA manifest
        async function bootOS() {
            try {
                // To prevent cache locking during laboratory testing
                const cacheBuster = new Date().getTime();
                const response = await fetch(`ssp-manifest.json?v=${cacheBuster}`);
                
                if (!response.ok) throw new Error('Manifest sequence failed');
                
                const apps = await response.json();
                renderGrid(apps);
            } catch (error) {
                console.error("OS Boot Failure:", error);
                gridContainer.innerHTML = `
                    <div class="col-span-full p-8 text-center border border-red-200 dark:border-red-900/50 bg-red-50 dark:bg-red-900/20 rounded-2xl">
                        <span class="text-red-600 dark:text-red-400 font-mono text-xs font-bold uppercase tracking-widest">System Error: Missing Manifest</span>
                        <p class="text-sm text-red-500 dark:text-red-300 mt-2">The ssp-manifest.json file could not be located in the root directory.</p>
                    </div>
                `;
            }
        }

        function renderGrid(apps) {
            gridContainer.innerHTML = ''; // Purge skeletons

            apps.forEach(app => {
                const tile = document.createElement('a');
                tile.href = app.file;
                tile.className = 'app-tile flex flex-col justify-between p-8 min-h-[220px] group text-decoration-none';
                
                tile.innerHTML = `
                    <div>
                        <div class="bg-blue-50 dark:bg-blue-900/30 text-sterling-blue dark:text-blue-400 w-14 h-14 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-sterling-green group-hover:text-white transition-all duration-300 ease-out">
                            ${app.icon}
                        </div>
                        <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 tracking-tight">${app.name}</h2>
                    </div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed mt-4 line-clamp-2">${app.desc}</p>
                `;

                gridContainer.appendChild(tile);
            });

            bindTilePhysics();
        }

        // ==========================================
        // SMART GLASS PHYSICS ENGINE
        // ==========================================
        function bindTilePhysics() {
            document.querySelectorAll('.app-tile').forEach(tile => {
                tile.addEventListener('mousemove', e => {
                    const rect = tile.getBoundingClientRect();
                    // Calculate exact Cartesian coordinates within the tile boundary
                    tile.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                    tile.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
                });
            });
        }

        // Ignite OS
        bootOS();

    </script>
</body>
</html>
