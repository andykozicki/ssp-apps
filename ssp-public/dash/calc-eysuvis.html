                    <div id="eyLogicBar" class="text-[10px] text-center text-gray-400 dark:text-gray-500 mb-4 font-mono opacity-0 transition-opacity duration-300 tracking-tight leading-relaxed"></div>
                    <div class="flex justify-center border-t border-gray-100 dark:border-gray-700 pt-5 transition-colors">
                        <button onclick="resetEysuvis()" class="text-xs font-bold text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors uppercase tracking-widest focus:outline-none">Reset Data</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        window.addEventListener('load', () => document.body.classList.remove('preload'));

        // Theme Sync
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        if (htmlElement.classList.contains('dark')) themeToggle.checked = true;

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        // ==========================================
        // EYSUVIS CALCULATOR LOGIC
        // ==========================================
        const eyInputs = document.querySelectorAll('[id^="ey"]');
        const eyBottlesInput = document.getElementById('eyBottles');
        
        let visibleEyPhases = 0;

        function updateEyInput(inputId, delta) {
            const inputEl = document.getElementById(inputId);
            let val = parseInt(inputEl.value);
            if (isNaN(val)) val = 0;
            val = Math.max(0, Math.min(99, val + delta));
            
            inputEl.value = val;
            calcEysuvis();
        }

        function setupEyKeydown(inputId) {
            const el = document.getElementById(inputId);
            if (!el) return;
            el.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp') { e.preventDefault(); updateEyInput(inputId, 1); }
                if (e.key === 'ArrowDown') { e.preventDefault(); updateEyInput(inputId, -1); }
            });
            el.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length > 2) val = val.slice(0, 2);
                e.target.value = val;
                calcEysuvis();
            });
        }

        // Bind dynamically accessible inputs
        [1, 2, 3, 4].forEach(num => {
            setupEyKeydown(`eyP${num}Dr`);
            setupEyKeydown(`eyP${num}Fq`);
        });

        function addEyPhase() {
            if (visibleEyPhases < 3) {
                visibleEyPhases++;
                document.getElementById('eyPhase' + visibleEyPhases).classList.remove('hidden');
                document.getElementById('eyTaperHeaders').classList.remove('hidden');
                document.getElementById('remTaperBtn').classList.remove('hidden');
            }
            if (visibleEyPhases === 3) {
                document.getElementById('addTaperBtn').classList.add('hidden');
            }
            calcEysuvis();
        }

        function remEyPhase() {
            if (visibleEyPhases > 0) {
                // Eradicate ghost data to prevent memory leaks
                document.getElementById(`eyP${visibleEyPhases}Dr`).value = '1';
                document.getElementById(`eyP${visibleEyPhases}Fq`).value = '';
                document.getElementById(`eyP${visibleEyPhases}Dy`).value = '';
                document.getElementById(`eyP${visibleEyPhases}Ey`).value = '2';
                
                document.getElementById('eyPhase' + visibleEyPhases).classList.add('hidden');
                visibleEyPhases--;
            }
            if (visibleEyPhases === 0) {
                document.getElementById('eyTaperHeaders').classList.add('hidden');
                document.getElementById('remTaperBtn').classList.add('hidden');
            }
            if (visibleEyPhases < 3) {
                document.getElementById('addTaperBtn').classList.remove('hidden');
            }
            calcEysuvis();
        }

        function updateEyBottles(delta) {
            let val = parseInt(eyBottlesInput.value) || 0;
            val = Math.max(0, Math.min(9, val + delta));
            eyBottlesInput.value = val;
            calcEysuvis();
        }

        eyBottlesInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') { e.preventDefault(); updateEyBottles(1); }
            if (e.key === 'ArrowDown') { e.preventDefault(); updateEyBottles(-1); }
        });

        eyBottlesInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 1) val = val.slice(0, 1);
            e.target.value = val;
            calcEysuvis();
        });
        
        function calcEysuvis() {
            const bottles = parseInt(eyBottlesInput.value) || 0;
            let totalDrops = bottles * 230;
            let remainingDrops = totalDrops;
            let totalDays = 0;
            let logicText = [];
            let ranOutEarly = false;

            const phases = [
                { dr: 'eyP1Dr', ey: 'eyP1Ey', fq: 'eyP1Fq', dy: 'eyP1Dy', name: 'P1' },
                { dr: 'eyP2Dr', ey: 'eyP2Ey', fq: 'eyP2Fq', dy: 'eyP2Dy', name: 'P2' },
                { dr: 'eyP3Dr', ey: 'eyP3Ey', fq: 'eyP3Fq', dy: 'eyP3Dy', name: 'P3' }
            ];

            if (bottles === 0) {
                document.getElementById('eyDaySupply').textContent = '--';
                document.getElementById('eyLogicBar').style.opacity = '0';
                document.getElementById('eyWarning').style.opacity = '0';
                return;
            }

            for (let i = 0; i < visibleEyPhases; i++) {
                let p = phases[i];
                let dr = parseFloat(document.getElementById(p.dr).value) || 0;
                let ey = parseInt(document.getElementById(p.ey).value) || 0;
                let fq = parseFloat(document.getElementById(p.fq).value) || 0;
                let dy = parseFloat(document.getElementById(p.dy).value) || 0;

                if (dr > 0 && ey > 0 && fq > 0 && dy > 0 && remainingDrops > 0 && !ranOutEarly) {
                    let dropsNeeded = dr * ey * fq * dy;
                    if (remainingDrops >= dropsNeeded) {
                        remainingDrops -= dropsNeeded;
                        totalDays += dy;
                        logicText.push(`${p.name}:${dropsNeeded}drp`);
                    } else {
                        let achievableDays = remainingDrops / (dr * ey * fq);
                        totalDays += achievableDays;
                        logicText.push(`${p.name}:${remainingDrops}drp(cap)`);
                        remainingDrops = 0;
                        ranOutEarly = true;
                    }
                }
            }

            let fDr = parseFloat(document.getElementById('eyP4Dr').value) || 0;
            let fEy = parseInt(document.getElementById('eyP4Ey').value) || 0;
            let fFq = parseFloat(document.getElementById('eyP4Fq').value) || 0;

            let finalPopulated = (fDr > 0 && fEy > 0 && fFq > 0);

            if (finalPopulated && remainingDrops > 0 && !ranOutEarly) {
                let dropsPerDay = fDr * fEy * fFq;
                let finalDays = remainingDrops / dropsPerDay;
                totalDays += finalDays;
                logicText.push(`Fin:${remainingDrops}drp@${dropsPerDay}/day`);
                remainingDrops = 0;
            } else if (remainingDrops > 0 && !ranOutEarly && logicText.length > 0) {
                logicText.push(`Rem:${remainingDrops}drp(unused)`);
            }

            let canShowResult = false;
            if (totalDays > 0) {
                if (ranOutEarly || finalPopulated) {
                    canShowResult = true;
                }
            }

            const daySupplyEl = document.getElementById('eyDaySupply');
            if (canShowResult) {
                daySupplyEl.textContent = Math.ceil(totalDays);
                document.getElementById('eyLogicBar').textContent = `Audit: [${totalDrops} Total] - ` + logicText.join(' - ');
                document.getElementById('eyLogicBar').style.opacity = '1';
                
                daySupplyEl.classList.add('scale-105');
                setTimeout(() => daySupplyEl.classList.remove('scale-105'), 150);
            } else {
                daySupplyEl.textContent = '--';
                document.getElementById('eyLogicBar').style.opacity = '0';
            }

            const warningEl = document.getElementById('eyWarning');
            if (ranOutEarly) {
                warningEl.style.opacity = '1';
                warningEl.style.transform = 'scale(1.02)';
            } else {
                warningEl.style.opacity = '0';
                warningEl.style.transform = 'scale(1)';
            }
        }

        function resetEysuvis() {
            eyBottlesInput.value = "1";
            
            while (visibleEyPhases > 0) {
                remEyPhase();
            }

            // Restore Phase 4 defaults
            document.getElementById('eyP4Dr').value = "1";
            document.getElementById('eyP4Fq').value = "";
            document.getElementById('eyP4Ey').value = "2";
            calcEysuvis();
        }

        // Bind standard change events
        eyInputs.forEach(input => {
            if (!input.id.includes('Dr') && !input.id.includes('Fq')) {
                input.addEventListener('input', calcEysuvis);
                input.addEventListener('change', calcEysuvis);
            }
        });

        // Initial Calculation Call
        calcEysuvis();
    </script>
</body>
</html>
