<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDD Calculator | SSP OS</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='2' width='16' height='20' rx='2' ry='2'/%3E%3Cline x1='8' y1='6' x2='16' y2='6'/%3E%3Cline x1='16' y1='14' x2='16' y2='18'/%3E%3Cpath d='M16 10h.01'/%3E%3Cpath d='M12 10h.01'/%3E%3Cpath d='M8 10h.01'/%3E%3Cpath d='M12 14h.01'/%3E%3Cpath d='M8 14h.01'/%3E%3Cpath d='M12 18h.01'/%3E%3Cpath d='M8 18h.01'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <script>
        if (localStorage.getItem('ssp-theme') === 'dark' || (!localStorage.getItem('ssp-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { 
            document.documentElement.classList.add('dark'); 
            localStorage.setItem('ssp-theme', 'dark');
        } else {
            localStorage.setItem('ssp-theme', 'light');
        }
    </script>

    <style>
        /* SSP Cupertino 2050 Design Tolerances */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        html.dark {
            --glass-bg: rgba(20, 20, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .preload * { transition: none !important; }
        
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        
        /* Spring Physics */
        .spring-transition { transition: all 0.5s var(--spring); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Dynamic ambient background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.03), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.03), transparent 25%);
        }
        .dark .ambient-bg {
            background: radial-gradient(circle at 15% 50%, rgba(22, 163, 74, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(0, 94, 184, 0.08), transparent 25%);
        }
    </style>
</head>
<body class="preload bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="ambient-bg transition-colors duration-500"></div>

    <div class="w-full px-6 py-4 flex justify-between items-center z-50 bg-white/40 dark:bg-black/40 backdrop-blur-2xl border-b border-black/5 dark:border-white/5 sticky top-0 transition-colors duration-300">
        <a href="index.html" class="flex items-center gap-2 text-gray-500 dark:text-gray-400 hover:text-sterling-green dark:hover:text-green-400 transition-colors group cursor-pointer text-decoration-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="font-bold text-sm tracking-widest uppercase opacity-90 mt-0.5">Dashboard</span>
        </a>

        <div class="flex items-center gap-3">
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Light / Dark</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="themeToggle" class="sr-only peer">
                <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-sterling-green"></div>
            </label>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-4 pt-10 pb-12 w-full z-10">

        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-50 tracking-tight spring-transition">MDD Calculator</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Sterling Specialty Pharmacy Internal Tool</p>
        </header>

        <main class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl border border-gray-200 dark:border-gray-700 rounded-2xl shadow-lg max-w-md w-full overflow-hidden relative">
            <div class="p-8 flex flex-col h-full">
                
                <div class="mb-6 mt-2">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Units / Dose</label>
                            <div class="relative w-full h-[42px]">
                                <input type="text" inputmode="numeric" pattern="[0-9]*" id="mddUnits" placeholder="e.g., 2" class="w-full h-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 transition-colors pr-8">
                                <div class="absolute right-0 top-0 bottom-0 flex flex-col border-l border-gray-300 dark:border-gray-600 w-8">
                                    <button type="button" onclick="updateMddInput('mddUnits', 1, 0, 999)" class="flex-1 flex justify-center items-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-tr-lg focus:outline-none transition-colors active:bg-gray-300 dark:active:bg-gray-500">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                    </button>
                                    <button type="button" onclick="updateMddInput('mddUnits', -1, 0, 999)" class="flex-1 flex justify-center items-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-br-lg border-t border-gray-300 dark:border-gray-600 focus:outline-none transition-colors active:bg-gray-300 dark:active:bg-gray-500">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Doses / Day</label>
                            <div class="relative w-full h-[42px]">
                                <input type="text" inputmode="numeric" pattern="[0-9]*" id="mddFreq" value="1" class="w-full h-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 transition-colors pr-8">
                                <div class="absolute right-0 top-0 bottom-0 flex flex-col border-l border-gray-300 dark:border-gray-600 w-8">
                                    <button type="button" onclick="updateMddInput('mddFreq', 1, 0, 99)" class="flex-1 flex justify-center items-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-tr-lg focus:outline-none transition-colors active:bg-gray-300 dark:active:bg-gray-500">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                    </button>
                                    <button type="button" onclick="updateMddInput('mddFreq', -1, 0, 99)" class="flex-1 flex justify-center items-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-br-lg border-t border-gray-300 dark:border-gray-600 focus:outline-none transition-colors active:bg-gray-300 dark:active:bg-gray-500">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-xl p-6 text-center transition-colors mt-8 shadow-sm">
                        <span class="text-xs text-gray-600 dark:text-gray-400 font-semibold uppercase tracking-wider">Calculated Max Daily Dose</span>
                        <div id="mddResult" class="text-6xl font-bold sterling-green mt-4 mb-2 spring-transition">--</div>
                    </div>
                </div>

                <div class="mt-auto pt-4">
                    <div id="mddLogicBar" class="text-[10px] text-center text-gray-400 dark:text-gray-500 mb-4 font-mono opacity-0 transition-opacity duration-300 tracking-tight leading-relaxed"></div>
                    <div class="flex justify-center border-t border-gray-100 dark:border-gray-700 pt-5 transition-colors">
                        <button onclick="resetMdd()" class="text-xs font-bold text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors uppercase tracking-widest focus:outline-none">Reset Data</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        window.addEventListener('load', () => document.body.classList.remove('preload'));

        // Theme Sync
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        if (htmlElement.classList.contains('dark')) themeToggle.checked = true;

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        // ==========================================
        // MDD CALCULATOR LOGIC
        // ==========================================
        const mddInputs = document.querySelectorAll('#mddUnits, #mddFreq');
        const mddResult = document.getElementById('mddResult');
        const mddLogicBar = document.getElementById('mddLogicBar');

        function updateMddInput(inputId, delta, min, max) {
            const inputEl = document.getElementById(inputId);
            let val = parseInt(inputEl.value) || 0;
            val = Math.max(min, Math.min(max, val + delta));
            inputEl.value = val;
            calcMdd();
        }

        // Stepper Keydown & Validation Hooks
        function setupMddKeydown(inputId, delta, min, max) {
            const el = document.getElementById(inputId);
            el.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp') { e.preventDefault(); updateMddInput(inputId, delta, min, max); }
                if (e.key === 'ArrowDown') { e.preventDefault(); updateMddInput(inputId, -delta, min, max); }
            });
            el.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, '');
                e.target.value = val;
                calcMdd();
            });
        }

        setupMddKeydown('mddUnits', 1, 0, 999);
        setupMddKeydown('mddFreq', 1, 0, 99);

        function calcMdd() {
            const units = parseInt(document.getElementById('mddUnits').value) || 0;
            const freq = parseInt(document.getElementById('mddFreq').value) || 0;
            
            if (units > 0 && freq > 0) {
                const mdd = units * freq;
                mddResult.textContent = mdd;
                mddLogicBar.textContent = `Audit: ${units} U × ${freq} doses/day = ${mdd} MDD`;
                mddLogicBar.style.opacity = '1';
                
                // Trigger spring physics bump
                mddResult.classList.add('scale-105');
                setTimeout(() => mddResult.classList.remove('scale-105'), 150);
            } else {
                mddResult.textContent = '--';
                mddLogicBar.style.opacity = '0';
            }
        }

        function resetMdd() {
            document.getElementById('mddUnits').value = "";
            document.getElementById('mddFreq').value = "1";
            calcMdd();
        }

        // Bind standard input listeners
        mddInputs.forEach(input => input.addEventListener('input', calcMdd));

        // Initial Calculation Call
        calcMdd();
    </script>
</body>
</html>
