<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Specialty | RTS Calculator</title>
    <!-- Using Tailwind CSS for clean, medical-grade styling without external dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .sterling-blue { color: #005eb8; }
        .bg-sterling-blue { background-color: #005eb8; }
        .btn-hover:hover { background-color: #004a91; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center py-12">

    <!-- Header -->
    <header class="mb-10 text-center">
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Refill Too Soon Calculator</h1>
        <p class="text-gray-500 mt-2 text-sm">Sterling Specialty Pharmacy Internal Tool</p>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-md bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        
        <!-- View 1: Initial State -->
        <div id="initial-view" class="p-8 flex flex-col items-center text-center">
            <div class="bg-blue-50 p-4 rounded-full mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 sterling-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Ready to Calculate</h2>
            <p class="text-gray-500 mb-8 text-sm">Generate allowable previous fill dates based on current day supply protocols.</p>
            
            <button onclick="generateRTS()" class="w-full bg-sterling-blue text-white font-semibold py-3 px-6 rounded-lg shadow-sm btn-hover transition duration-200 ease-in-out flex items-center justify-center gap-2">
                Generate Dates for Today
            </button>
        </div>

        <!-- View 2: Results Table (Hidden by default) -->
        <div id="results-view" class="hidden">
            <div class="bg-gray-50 border-b border-gray-200 p-4 flex justify-between items-center">
                <div>
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Reference Date</span>
                    <div id="display-date" class="text-lg font-bold text-gray-800"></div>
                </div>
                <button onclick="resetApp()" class="text-sm text-gray-500 hover:text-gray-700 underline">Reset</button>
            </div>

            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 border-b border-gray-200 text-xs uppercase text-gray-500 font-semibold">
                        <th class="p-4 w-1/2">Day Supply</th>
                        <th class="p-4 w-1/2 text-right">Latest Valid Fill Date</th>
                    </tr>
                </thead>
                <tbody id="rts-table-body" class="divide-y divide-gray-100">
                    <!-- Rows generated by JS -->
                </tbody>
            </table>
            
            <div class="p-4 bg-yellow-50 text-yellow-800 text-xs border-t border-yellow-100">
                <strong>Logic:</strong> [Today] - (DS - 8) = Valid Fill Date
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-12 text-gray-400 text-xs">
        <p>&copy; <span id="year"></span> Sterling Specialty Pharmacy</p>
    </footer>

    <script>
        // Configuration
        const daySupplies = [28, 30, 56, 60, 84, 90];
        
        // DOM Elements
        const initialView = document.getElementById('initial-view');
        const resultsView = document.getElementById('results-view');
        const tableBody = document.getElementById('rts-table-body');
        const dateDisplay = document.getElementById('display-date');
        document.getElementById('year').textContent = new Date().getFullYear();

        function generateRTS() {
            const today = new Date();
            
            // Format today's date for display
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            dateDisplay.textContent = today.toLocaleDateString('en-US', options);

            // Clear previous results
            tableBody.innerHTML = '';

            daySupplies.forEach(ds => {
                // Calculation: Today - (DS - 8)
                // If DS is 30, we subtract (30-8) = 22 days from today.
                const daysToSubtract = ds - 8;
                
                const targetDate = new Date(today);
                targetDate.setDate(today.getDate() - daysToSubtract);
                
                // Create Row
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50 transition-colors";
                
                row.innerHTML = `
                    <td class="p-4 text-gray-900 font-medium">${ds} Days</td>
                    <td class="p-4 text-right font-mono font-bold sterling-blue">${formatDate(targetDate)}</td>
                `;
                
                tableBody.appendChild(row);
            });

            // Toggle Views
            initialView.classList.add('hidden');
            resultsView.classList.remove('hidden');
        }

        function resetApp() {
            resultsView.classList.add('hidden');
            initialView.classList.remove('hidden');
        }

        function formatDate(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const y = date.getFullYear();
            return `${m}/${d}/${y}`;
        }
    </script>
</body>
</html>
