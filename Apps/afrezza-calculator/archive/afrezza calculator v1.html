<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrezza Calculator | Sterling Specialty</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235E9633' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='2' width='16' height='20' rx='2' ry='2'/%3E%3Cline x1='8' y1='6' x2='16' y2='6'/%3E%3Cline x1='16' y1='14' x2='16' y2='18'/%3E%3Cpath d='M16 10h.01'/%3E%3Cpath d='M12 10h.01'/%3E%3Cpath d='M8 10h.01'/%3E%3Cpath d='M12 14h.01'/%3E%3Cpath d='M8 14h.01'/%3E%3Cpath d='M12 18h.01'/%3E%3Cpath d='M8 18h.01'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        .sterling-blue { color: #005eb8; }
        .bg-sterling-blue { background-color: #005eb8; }
        
        .gauge-base { padding: 1rem; border-radius: 0.375rem; font-weight: 600; text-align: center; transition: all 0.3s ease; line-height: 1.4; font-size: 0.875rem; }
        
        .gray { background-color: #f3f4f6; color: #6b7280; border: 1px dashed #d1d5db; }
        .dark .gray { background-color: rgba(31, 41, 55, 0.5); color: #9ca3af; border-color: #4b5563; }
        
        .green { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .dark .green { background-color: rgba(22, 101, 52, 0.2); color: #86efac; border-color: rgba(22, 101, 52, 0.5); }
        
        .yellow { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .dark .yellow { background-color: rgba(133, 77, 14, 0.2); color: #fde047; border-color: rgba(133, 77, 14, 0.5); }
        
        .orange { background-color: #ffedd5; color: #9a3412; border: 1px solid #fdba74; }
        .dark .orange { background-color: rgba(154, 52, 18, 0.2); color: #fdba74; border-color: rgba(154, 52, 18, 0.5); }
        
        .red { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .dark .red { background-color: rgba(153, 27, 27, 0.2); color: #fca5a5; border-color: rgba(153, 27, 27, 0.5); }
        
        .dark-red { background-color: #7f1d1d; color: #ffffff; border: 1px solid #450a0a; }
        .dark .dark-red { background-color: rgba(69, 10, 10, 0.5); color: #ffffff; border-color: #7f1d1d; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="w-full p-4 flex justify-between items-center">
        <a href="../index.html" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 inline-flex items-center gap-2 text-sm transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Dashboard
        </a>

        <div class="flex items-center gap-2">
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Light / Dark</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="themeToggle" class="sr-only peer">
                <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-sterling-blue"></div>
            </label>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-4 pt-6 pb-12">

        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-50 tracking-tight">Afrezza Calculator</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Sterling Specialty Pharmacy Internal Tool</p>
        </header>

        <main class="w-full max-w-lg bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-700 p-8 transition-colors duration-300">
            
            <div class="mb-6">
                <h3 class="text-md font-bold text-gray-800 dark:text-gray-100 mb-4 border-b border-gray-100 dark:border-gray-700 pb-2 transition-colors">Prescription Details</h3>
                
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Product Selection</label>
                    <select id="product" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white dark:bg-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="0">Select dispensed product...</option>
                        <option value="360">4 unit box (90ct / 360 U total)</option>
                        <option value="720">8 unit box (90ct / 720 U total)</option>
                        <option value="1080">12 unit box (90ct / 1080 U total)</option>
                        <option value="1080_combo">4, 8 unit box (180ct / 1080 U total)</option>
                        <option value="1800">8, 12 unit box (180ct / 1800 U total)</option>
                        <option value="1440">4, 8, 12 unit box (180ct / 1440 U total)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Packages Dispensed</label>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" id="qty" value="1" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Max Daily Dose (Units)</label>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" id="maxDose" placeholder="e.g., 84" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 rounded p-3 text-center mb-2 transition-colors">
                    <span class="text-xs text-blue-600 dark:text-blue-400 font-semibold uppercase">Calculated Day Supply</span>
                    <div id="daySupplyOutput" class="text-2xl font-bold sterling-blue dark:text-blue-400 mt-1">--</div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="text-md font-bold text-gray-800 dark:text-gray-100 mb-4 border-b border-gray-100 dark:border-gray-700 pb-2 transition-colors">Correction Dose Sanity Check</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Scheduled Units / Meal</label>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" id="mealUnits" placeholder="e.g., 12" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Meals per Day</label>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" id="mealFreq" placeholder="e.g., 3" class="w-full bg-transparent border border-gray-300 dark:border-gray-600 dark:text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <div id="gauge" class="gauge-base gray">
                    Enter meal data to calculate the correction buffer.
                </div>

                <div class="mt-6 flex justify-center border-t border-gray-100 dark:border-gray-700 pt-4 transition-colors">
                    <button id="resetBtn" class="text-sm font-semibold text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors uppercase tracking-wider">Reset</button>
                </div>
            </div>

        </main>

        <footer class="mt-12 text-gray-400 dark:text-gray-500 text-xs text-center w-full">
            <p>&copy; <span id="year"></span> Sterling Specialty Pharmacy</p>
        </footer>

    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        
        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                htmlElement.classList.add('dark');
            } else {
                htmlElement.classList.remove('dark');
            }
        });

        document.getElementById('year').textContent = new Date().getFullYear();

        const inputs = document.querySelectorAll('input, select');
        const daySupplyOutput = document.getElementById('daySupplyOutput');
        const gauge = document.getElementById('gauge');
        const resetBtn = document.getElementById('resetBtn');

        function calculate() {
            let prodValue = document.getElementById('product').value;
            let totalUnitsPerBox = prodValue === '1080_combo' ? 1080 : parseInt(prodValue) || 0;
            
            const qty = parseInt(document.getElementById('qty').value) || 0;
            const maxDose = parseInt(document.getElementById('maxDose').value) || 0;
            const mealUnits = parseInt(document.getElementById('mealUnits').value) || 0;
            const mealFreq = parseInt(document.getElementById('mealFreq').value) || 0;

            if (totalUnitsPerBox > 0 && maxDose > 0 && qty > 0) {
                const totalDispensed = totalUnitsPerBox * qty;
                const days = Math.floor(totalDispensed / maxDose);
                daySupplyOutput.textContent = days;
            } else {
                daySupplyOutput.textContent = '--';
            }

            if (totalUnitsPerBox === 0 || maxDose === 0 || mealUnits === 0 || mealFreq === 0) {
                gauge.className = 'gauge-base gray';
                gauge.textContent = 'Enter meal data to calculate the correction buffer.';
                return;
            }

            const baseDose = mealUnits * mealFreq;
            const correctionUnits = maxDose - baseDose;
            
            if (correctionUnits < 0) {
                gauge.className = 'gauge-base red';
                gauge.innerHTML = `<strong>ERROR:</strong> Scheduled meals (${baseDose} U) exceed Max Daily Dose (${maxDose} U).`;
                return;
            }

            const correctionPct = (correctionUnits / maxDose) * 100;

            if (correctionPct <= 30) {
                gauge.className = 'gauge-base green';
                gauge.innerHTML = `<strong>GOOD!</strong> ${correctionPct.toFixed(0)}% correction buffer (${correctionUnits} U).`;
            } else if (correctionPct <= 55) {
                gauge.className = 'gauge-base yellow';
                gauge.innerHTML = `<strong>BORDERLINE:</strong> ${correctionPct.toFixed(0)}% correction buffer (${correctionUnits} U). Proceed with caution.`;
            } else if (correctionPct <= 80) {
                gauge.className = 'gauge-base orange';
                gauge.innerHTML = `<strong>WARNING: NEEDS CLARIFICATION</strong><br>${correctionPct.toFixed(0)}% correction buffer (${correctionUnits} U). Send to Rph to verify.`;
            } else {
                gauge.className = 'gauge-base dark-red';
                gauge.innerHTML = `<strong>INCONCEIVABLE!</strong><br>I do not think 'Max Dose' means what you think it means.<br>${correctionPct.toFixed(0)}% correction buffer (${correctionUnits} U). Clarification REQUIRED.`;
            }
        }

        function resetCalculator() {
            document.getElementById('product').value = "0";
            document.getElementById('qty').value = "1";
            document.getElementById('maxDose').value = "";
            document.getElementById('mealUnits').value = "";
            document.getElementById('mealFreq').value = "";
            calculate();
        }

        inputs.forEach(input => input.addEventListener('input', calculate));
        resetBtn.addEventListener('click', resetCalculator);
    </script>
</body>
</html>
