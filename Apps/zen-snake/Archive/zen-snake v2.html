<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Snake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Corporate Colors */
    .sterling-green { color: #16a34a; }
    .bg-sterling-green { background-color: #16a34a; }
    
    /* App Specific Styles */
    .game-canvas {
      background-color: #f8fafc; /* Very soft slate/blue-gray */
      border-radius: 12px;
      transition: opacity 1.5s ease-in-out;
    }

    .game-canvas.fade-out {
      opacity: 0.2;
    }

    .overlay {
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Score Pop Animation */
    .score-pop {
      transform: scale(1.3);
      color: #16a34a;
    }
    #scoreDisplay {
      transition: all 0.2s ease-out;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-800">

  <div class="w-full p-4">
    <a href="../index.html" class="text-gray-500 hover:text-gray-700 inline-flex items-center gap-2 text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to Dashboard
    </a>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center p-4">
    
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Zen Snake</h1>
      <p class="text-gray-500 mt-1">Sterling Specialty Pharmacy Internal Tool</p>
    </header>

    <main class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 w-full max-w-md relative flex flex-col items-center">
      
      <div class="w-full flex justify-between items-end mb-4 text-sm font-medium text-gray-600">
        <div class="flex flex-col gap-2">
          <select id="speedSelect" class="bg-gray-50 border border-gray-200 text-gray-700 rounded-md px-2 py-1 outline-none focus:border-green-500 transition-colors">
            <option value="200">Pace: Stroll</option>
            <option value="130" selected>Pace: Walk</option>
            <option value="80">Pace: Jog</option>
          </select>
          <button id="pauseBtn" class="bg-gray-100 hover:bg-gray-200 border border-gray-200 text-gray-700 px-3 py-1 rounded-md transition-colors w-full text-center">Pause</button>
        </div>
        
        <div class="text-right">
          <div class="text-xs text-gray-400 mb-1">Best: <span id="bestScoreDisplay">0</span></div>
          <div class="text-base">
            Prescriptions: <span id="scoreDisplay" class="font-bold text-lg inline-block">0</span>
          </div>
        </div>
      </div>

      <div class="relative w-full flex justify-center">
        <canvas id="gameCanvas" width="360" height="360" class="game-canvas"></canvas>
        
        <div id="overlay" class="overlay absolute inset-0 flex flex-col items-center justify-center">
          <button id="startBtn" class="bg-sterling-green hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg shadow-md transition-all hover:shadow-lg active:scale-95">
            Start Relaxing
          </button>
        </div>

        <div id="pauseOverlay" class="overlay absolute inset-0 flex items-center justify-center bg-white/40 rounded-xl backdrop-blur-[1px]">
          <span class="text-2xl font-bold text-gray-500 tracking-widest uppercase">Paused</span>
        </div>
      </div>

    </main>

    <footer class="mt-12 text-gray-400 text-xs text-center">
      &copy; <span id="year"></span> Sterling Specialty Pharmacy. All rights reserved.
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const speedSelect = document.getElementById('speedSelect');
    const pauseBtn = document.getElementById('pauseBtn');
    const overlay = document.getElementById('overlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const startBtn = document.getElementById('startBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const bestScoreDisplay = document.getElementById('bestScoreDisplay');

    const gridSize = 18;
    const tileCount = canvas.width / gridSize;
    
    let snake = [];
    let food = {};
    let dx = 0;
    let dy = 0;
    let gameTimeout;
    let isPaused = false;
    let isGameOver = false;
    let prescriptionsCollected = 0;
    
    // Load local high score
    let bestScore = localStorage.getItem('ssp_zen_snake_best') || 0;
    bestScoreDisplay.innerText = bestScore;

    const colorSnakeHead = '#22c55e'; // Vibrant green

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 10, y: 11 },
        { x: 10, y: 12 },
        { x: 10, y: 13 }
      ];
      dx = 0;
      dy = -1; 
      isGameOver = false;
      isPaused = false;
      prescriptionsCollected = 0;
      
      pauseBtn.innerText = "Pause";
      scoreDisplay.innerText = prescriptionsCollected;
      
      canvas.classList.remove('fade-out');
      overlay.classList.remove('visible');
      pauseOverlay.classList.remove('visible');
      
      spawnFood();
      clearTimeout(gameTimeout);
      gameLoop();
    }

    function spawnFood() {
      food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          spawnFood();
          return;
        }
      }
    }

    function gameLoop() {
      if (isPaused || isGameOver) return;
      update();
      draw();
      if (!isGameOver) {
        const speed = parseInt(speedSelect.value);
        gameTimeout = setTimeout(gameLoop, speed);
      }
    }

    function update() {
      let head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Wrap-around Border Logic
      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;

      // Self Collision
      for (let i = 0; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          triggerGameOver();
          return;
        }
      }

      snake.unshift(head);

      // Check food (Prescription pickup)
      if (head.x === food.x && head.y === food.y) {
        prescriptionsCollected++;
        scoreDisplay.innerText = prescriptionsCollected;
        
        // CSS Pop Animation
        scoreDisplay.classList.add('score-pop');
        setTimeout(() => scoreDisplay.classList.remove('score-pop'), 200);

        // Update High Score
        if (prescriptionsCollected > bestScore) {
          bestScore = prescriptionsCollected;
          bestScoreDisplay.innerText = bestScore;
          localStorage.setItem('ssp_zen_snake_best', bestScore);
        }

        spawnFood(); 
      } else {
        snake.pop(); 
      }
    }

    function drawGrid() {
      ctx.strokeStyle = '#e2e8f0'; // Tailwind slate-200
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawPill(x, y) {
      const size = gridSize;
      const w = size * 0.75;
      const h = size * 0.45;
      const cx = x * gridSize + size / 2;
      const cy = y * gridSize + size / 2;
      
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.PI / 4); 
      
      // Shadow for depth
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;

      // Blue half
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath();
      ctx.arc(-w/4, 0, h/2, Math.PI/2, Math.PI*1.5);
      ctx.lineTo(0, -h/2);
      ctx.lineTo(0, h/2);
      ctx.fill();
      
      // White half
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(w/4, 0, h/2, -Math.PI/2, Math.PI/2);
      ctx.lineTo(0, h/2);
      ctx.lineTo(0, -h/2);
      ctx.fill();
      
      // Delicate Border
      ctx.shadowColor = 'transparent'; // Remove shadow for stroke
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(-w/4, 0, h/2, Math.PI/2, Math.PI*1.5);
      ctx.lineTo(w/4, -h/2);
      ctx.arc(w/4, 0, h/2, -Math.PI/2, Math.PI/2);
      ctx.closePath();
      ctx.stroke();
      
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      drawGrid();
      drawPill(food.x, food.y);

      // Draw Fading Snake
      snake.forEach((segment, index) => {
        // Calculate opacity: Head is 1.0, tail fades down to 0.25
        const opacity = Math.max(0.25, 1 - (index / snake.length) * 0.8);
        
        ctx.fillStyle = index === 0 ? colorSnakeHead : `rgba(34, 197, 94, ${opacity})`;
        ctx.beginPath();
        ctx.arc(
          segment.x * gridSize + gridSize / 2, 
          segment.y * gridSize + gridSize / 2, 
          (gridSize / 2) - 1, 
          0, 
          Math.PI * 2
        );
        ctx.fill();
      });
    }

    function triggerGameOver() {
      isGameOver = true;
      canvas.classList.add('fade-out');
      overlay.classList.add('visible');
      startBtn.innerText = "Start Again";
    }

    function togglePause() {
      if (isGameOver) return;
      isPaused = !isPaused;
      pauseBtn.innerText = isPaused ? "Resume" : "Pause";
      
      if (isPaused) {
        pauseOverlay.classList.add('visible');
      } else {
        pauseOverlay.classList.remove('visible');
        gameLoop();
      }
    }

    // Controls
    window.addEventListener('keydown', e => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space", "Escape"].includes(e.code)) {
        e.preventDefault();
      }
      
      // Require game to be active to move
      if (isPaused || isGameOver) {
        if (e.code === 'Space' || e.code === 'Escape') togglePause();
        return;
      }

      if (e.code === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
      else if (e.code === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
      else if (e.code === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
      else if (e.code === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
      else if (e.code === 'Space' || e.code === 'Escape') { togglePause(); }
    });

    pauseBtn.addEventListener('click', togglePause);
    startBtn.addEventListener('click', initGame);

    window.addEventListener('blur', () => {
      if (!isPaused && !isGameOver) {
        togglePause();
      }
    });

    // Initial setup state
    triggerGameOver(); 
  </script>
</body>
</html>
