<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Snake - SSP Clinical Tool Hub</title>
  
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M7 3h.01M17 3h.01M5 7c0-2 2-4 5-4s5 2 5 4-2 4-5 4-5 2-5 4 2 4 5 4h2a5 5 0 0 0 5-5v-1'/%3E%3Cpath d='M12 21v-2'/%3E%3C/svg%3E">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  
  <style>
    /* SSP Corporate Colors */
    .sterling-green { color: #16a34a; }
    .bg-sterling-green { background-color: #16a34a; }
    
    #game-container canvas {
      border-radius: 4px; 
      transition: opacity 1.5s ease-in-out;
      display: block;
      margin: 0 auto;
    }

    .overlay {
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .score-pop { transform: scale(1.3); color: #16a34a; }
    .score-pop-mega { transform: scale(1.5); color: #a855f7; }
    #scoreDisplay { transition: all 0.2s ease-out; display: inline-block; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

  <div class="w-full p-4 flex justify-between items-center">
    <a href="../index.html" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 inline-flex items-center gap-2 text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to Dashboard
    </a>

    <div class="flex items-center gap-2">
      <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Light / Dark</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" id="themeToggle" class="sr-only peer">
        <div class="w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-sterling-green"></div>
      </label>
    </div>
  </div>

  <div class="flex-1 flex flex-col items-center px-4">
    
    <header class="text-center mb-6 mt-4">
      <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-50 tracking-tight">Zen Snake</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Sterling Specialty Pharmacy Internal Tool</p>
    </header>

    <main class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow max-w-md w-full p-6 relative flex flex-col items-center transition-colors duration-300">
      
      <div class="w-full flex justify-between items-end mb-4 text-sm font-medium text-gray-600 dark:text-gray-300">
        <div class="flex flex-col gap-2">
          <select id="speedSelect" class="bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 rounded-md px-2 py-1 outline-none focus:border-green-500 transition-colors">
            <option value="250">Pace: Crawl</option>
            <option value="180" selected>Pace: Walk</option>
            <option value="110">Pace: Jog</option>
          </select>
          <button id="pauseBtn" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200 px-3 py-1 rounded-md transition-colors w-full text-center">Pause</button>
        </div>
        
        <div class="text-right">
          <div class="text-xs text-gray-400 dark:text-gray-500 mb-1">Best: <span id="bestScoreDisplay">0</span></div>
          <div class="text-base">
            Prescriptions: <span id="scoreDisplay" class="font-bold text-lg dark:text-white">0</span>
          </div>
        </div>
      </div>

      <div class="relative w-full flex justify-center">
        <div id="game-container" class="shadow-inner relative z-0"></div>
        
        <div id="overlay" class="overlay absolute inset-0 z-10 flex flex-col items-center justify-center">
          <button id="startBtn" class="bg-sterling-green hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg shadow-md transition-all hover:shadow-lg active:scale-95">
            Start Relaxing
          </button>
        </div>

        <div id="pauseOverlay" class="overlay absolute inset-0 z-10 flex items-center justify-center bg-white/40 dark:bg-gray-900/60 rounded backdrop-blur-sm">
          <span class="text-2xl font-bold text-gray-500 dark:text-gray-300 tracking-widest uppercase shadow-sm">Paused</span>
        </div>
      </div>

    </main>

    <footer class="mt-12 text-gray-400 text-xs text-center pb-6">
      &copy; <span id="year"></span> Sterling Specialty Pharmacy. All rights reserved.
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // UI State & Elements
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    const speedSelect = document.getElementById('speedSelect');
    const pauseBtn = document.getElementById('pauseBtn');
    const overlay = document.getElementById('overlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const startBtn = document.getElementById('startBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const bestScoreDisplay = document.getElementById('bestScoreDisplay');
    
    let bestScore = localStorage.getItem('ssp_zen_snake_best') || 0;
    bestScoreDisplay.innerText = bestScore;
    let phaserGame = null;

    // --- Global Dashboard Features: Light/Dark Persistence ---
    const savedTheme = localStorage.getItem('ssp_theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        htmlElement.classList.add('dark');
        themeToggle.checked = true;
    }

    themeToggle.addEventListener('change', (e) => {
      if (e.target.checked) {
          htmlElement.classList.add('dark');
          localStorage.setItem('ssp_theme', 'dark');
      } else {
          htmlElement.classList.remove('dark');
          localStorage.setItem('ssp_theme', 'light');
      }
      if (phaserGame && phaserGame.scene.keys.MainScene) {
        phaserGame.scene.keys.MainScene.updateTheme();
      }
    });

    // --- Phaser Game Engine ---
    class MainScene extends Phaser.Scene {
      constructor() {
        super({ key: 'MainScene' });
        this.gridSize = 24;
        this.canvasSize = 384; 
        this.tileCount = this.canvasSize / this.gridSize;
        
        this.snake = [];
        this.snakePts = []; 
        this.food = null;
        this.syringe = null;
        
        this.dx = 0; this.dy = -1;
        this.inputQueue = []; 
        
        this.prescriptionsCollected = 0;
        this.pendingGrowth = 0;
        this.moveTimer = null;
        this.isGameOver = true;
        
        this.ripples = [];
        this.blinkTimer = 0;
      }

      create() {
        this.createTextures();
        
        this.gridLayer = this.add.graphics();
        this.rippleLayer = this.add.graphics();
        this.splineLayer = this.add.graphics();
        this.eyesLayer = this.add.graphics();

        this.purpleEmitter = this.add.particles(0, 0, 'particle', {
            emitting: false,
            speed: { min: 60, max: 150 },
            scale: { start: 1.2, end: 0 },
            tint: [0xa855f7, 0xd8b4fe],
            lifespan: 600,
            blendMode: 'ADD'
        });

        this.deathEmitter = this.add.particles(0, 0, 'particle', {
            emitting: false,
            speed: { min: 10, max: 40 },
            scale: { start: 1.5, end: 0 },
            tint: 0x22c55e,
            lifespan: 1500,
            blendMode: 'SCREEN',
            alpha: { start: 0.8, end: 0 }
        });

        this.pillLeft = this.add.sprite(-100, -100, 'pill_l').setDepth(10);
        this.pillRight = this.add.sprite(-100, -100, 'pill_r').setDepth(10);
        
        this.syringeSprite = this.add.sprite(-100, -100, 'syringe').setDepth(9).setVisible(false);
        this.syringeSprite.preFX.addGlow(0xa855f7, 4, 0, false);
        this.tweens.add({
            targets: this.syringeSprite,
            scaleX: 1.15, scaleY: 1.15,
            yoyo: true, repeat: -1, duration: 600, ease: 'Sine.easeInOut'
        });

        this.updateTheme();
        
        this.input.keyboard.on('keydown', this.handleInput, this);
        startBtn.onclick = () => this.startGame();
        pauseBtn.onclick = () => this.togglePause();
        
        // --- Blur & Visibility Pause Handling ---
        window.addEventListener('blur', () => this.autoPause());
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) this.autoPause();
        });

        // Initialize UI State
        const savedState = localStorage.getItem('ssp_zen_snake_state');
        if (savedState) {
            startBtn.innerText = "Resume Session";
        }
        this.triggerGameOver(true); 
      }

      autoPause() {
        if (!this.isGameOver && !this.scene.isPaused()) {
            this.togglePause();
        }
      }

      createTextures() {
        let g = this.make.graphics({x:0, y:0, add:false});
        
        g.fillStyle(0xffffff, 1);
        g.fillCircle(4, 4, 4);
        g.generateTexture('particle', 8, 8);
        g.clear();

        g.fillStyle(0x16a34a, 1);
        g.fillCircle(5, 5, 5);
        g.fillRect(5, 0, 3, 10);
        g.generateTexture('pill_l', 8, 10);
        g.clear();

        g.fillStyle(0xcbd5e1, 1);
        g.fillRect(0, 0, 3, 10);
        g.fillCircle(3, 5, 5);
        g.generateTexture('pill_r', 8, 10);
        g.clear();

        g.fillStyle(0xa855f7, 1);
        g.fillRect(4, 8, 8, 16);
        g.lineStyle(2, 0xcbd5e1, 1);
        g.strokeRect(4, 8, 8, 16);
        g.beginPath(); g.moveTo(8, 8); g.lineTo(8, 0); g.strokePath();
        g.generateTexture('syringe', 16, 24);
        g.clear();
      }

      updateTheme() {
        this.isDark = htmlElement.classList.contains('dark');
        this.cameras.main.setBackgroundColor(this.isDark ? '#0f172a' : '#ffffff');
        
        this.gridLayer.clear();
        this.gridLayer.lineStyle(0.5, this.isDark ? 0x1e293b : 0xe0f2fe, 1);
        for (let i = 0; i <= this.tileCount; i++) {
          this.gridLayer.moveTo(i * this.gridSize, 0);
          this.gridLayer.lineTo(i * this.gridSize, this.canvasSize);
          this.gridLayer.moveTo(0, i * this.gridSize);
          this.gridLayer.lineTo(this.canvasSize, i * this.gridSize);
        }
        this.gridLayer.strokePath();
      }

      startGame() {
        this.isGameOver = false;
        overlay.classList.remove('visible');
        pauseOverlay.classList.remove('visible');
        pauseBtn.innerText = "Pause";
        
        const savedData = localStorage.getItem('ssp_zen_snake_state');
        
        if (savedData) {
            // Restore Session
            const state = JSON.parse(savedData);
            this.snake = state.snake;
            this.dx = state.dx;
            this.dy = state.dy;
            this.prescriptionsCollected = state.prescriptionsCollected;
            this.pendingGrowth = state.pendingGrowth;
            this.food = state.food;
            this.syringe = state.syringe;
            speedSelect.value = state.speed;
            
            // Re-map graphic points
            this.snakePts = this.snake.map(s => ({
                x: s.x * this.gridSize + this.gridSize/2,
                y: s.y * this.gridSize + this.gridSize/2,
                dead: false
            }));

            // Restore Food Visuals
            let px = this.food.x * this.gridSize + this.gridSize/2;
            let py = this.food.y * this.gridSize + this.gridSize/2;
            this.pillLeft.setPosition(px - 4, py).setAlpha(1).setAngle(0);
            this.pillRight.setPosition(px + 4, py).setAlpha(1).setAngle(0);

            // Restore Syringe Visuals
            if (this.syringe) {
                this.syringeSprite.setPosition(
                    this.syringe.x * this.gridSize + this.gridSize/2,
                    this.syringe.y * this.gridSize + this.gridSize/2
                ).setVisible(true).setAlpha(1);
            } else {
                this.syringeSprite.setVisible(false);
            }
            
            localStorage.removeItem('ssp_zen_snake_state'); // Clear so a refresh doesn't allow infinite retries
        } else {
            // Fresh Start
            const startPos = Math.floor(this.tileCount / 2);
            this.snake = [
                { x: startPos, y: startPos }, { x: startPos, y: startPos + 1 },
                { x: startPos, y: startPos + 2 }, { x: startPos, y: startPos + 3 }
            ];
            
            this.snakePts = this.snake.map(s => ({
                x: s.x * this.gridSize + this.gridSize/2,
                y: s.y * this.gridSize + this.gridSize/2,
                dead: false
            }));
            
            this.dx = 0; this.dy = -1;
            this.prescriptionsCollected = 0;
            this.pendingGrowth = 0;
            this.syringe = null;
            this.syringeSprite.setVisible(false);
            this.spawnFood();
        }

        this.inputQueue = [];
        this.ripples = [];
        
        this.scene.resume();
        this.updateScoreUI(false);
        this.setSpeed(parseInt(speedSelect.value));
      }

      saveState() {
        if (this.isGameOver) return;
        const state = {
            snake: this.snake,
            food: this.food,
            syringe: this.syringe,
            dx: this.dx,
            dy: this.dy,
            prescriptionsCollected: this.prescriptionsCollected,
            pendingGrowth: this.pendingGrowth,
            speed: parseInt(speedSelect.value)
        };
        localStorage.setItem('ssp_zen_snake_state', JSON.stringify(state));
      }

      setSpeed(delay) {
        if (this.moveTimer) this.moveTimer.remove();
        this.moveTimer = this.time.addEvent({
          delay: delay,
          callback: this.moveSnake,
          callbackScope: this,
          loop: true
        });
      }

      handleInput(event) {
        if (this.isGameOver) return;
        if (event.code === 'Space' || event.code === 'Escape') {
          this.togglePause(); return;
        }
        if (this.scene.isPaused()) return;

        const validKeys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
        if (validKeys.includes(event.code)) {
            if (this.inputQueue.length < 2) {
                this.inputQueue.push(event.code);
            }
        }
      }

      togglePause() {
        if (this.isGameOver) return;
        if (this.scene.isPaused()) {
          this.scene.resume();
          pauseBtn.innerText = "Pause";
          pauseOverlay.classList.remove('visible');
          localStorage.removeItem('ssp_zen_snake_state'); // Resumed playing, invalidate save
        } else {
          this.scene.pause();
          pauseBtn.innerText = "Resume";
          pauseOverlay.classList.add('visible');
          this.saveState(); // Saved state on pause
        }
      }

      getEmptyTile() {
        let tile, collision;
        do {
          collision = false;
          tile = { x: Phaser.Math.Between(0, this.tileCount - 1), y: Phaser.Math.Between(0, this.tileCount - 1) };
          for (let s of this.snake) if (s.x === tile.x && s.y === tile.y) collision = true;
          if (this.food && this.food.x === tile.x && this.food.y === tile.y) collision = true;
          if (this.syringe && this.syringe.x === tile.x && this.syringe.y === tile.y) collision = true;
        } while (collision);
        return tile;
      }

      spawnFood() {
        this.food = this.getEmptyTile();
        let px = this.food.x * this.gridSize + this.gridSize/2;
        let py = this.food.y * this.gridSize + this.gridSize/2;
        
        this.pillLeft.setPosition(px - 15, py - 10).setAlpha(0).setAngle(-45);
        this.pillRight.setPosition(px + 15, py + 10).setAlpha(0).setAngle(45);
        
        this.tweens.add({ targets: this.pillLeft, x: px - 4, y: py, alpha: 1, angle: 0, duration: 400, ease: 'Back.easeOut' });
        this.tweens.add({ targets: this.pillRight, x: px + 4, y: py, alpha: 1, angle: 0, duration: 400, ease: 'Back.easeOut' });

        if (!this.syringe && Math.random() < 0.20) {
          this.syringe = this.getEmptyTile();
          this.syringeSprite.setPosition(
            this.syringe.x * this.gridSize + this.gridSize/2,
            this.syringe.y * this.gridSize + this.gridSize/2
          );
          this.syringeSprite.setVisible(true).setAlpha(0);
          this.tweens.add({ targets: this.syringeSprite, alpha: 1, duration: 600 });
        }
      }

      showFloatingText(px, py, text, color) {
          let txt = this.add.text(px, py, text, {
              fontSize: '22px', 
              fontFamily: 'sans-serif',
              fontStyle: 'bold', 
              color: color, 
              stroke: this.isDark ? '#0f172a' : '#ffffff', 
              strokeThickness: 5 
          }).setOrigin(0.5).setDepth(25);
          
          this.tweens.add({ 
              targets: txt, 
              y: py - 40, 
              alpha: 0, 
              duration: 900, 
              ease: 'Cubic.easeOut', 
              onComplete: () => txt.destroy() 
          });
      }

      moveSnake() {
        if (this.inputQueue.length > 0) {
            let nextMove = this.inputQueue.shift();
            if (nextMove === 'ArrowUp' && this.dy === 0) { this.dx = 0; this.dy = -1; }
            else if (nextMove === 'ArrowDown' && this.dy === 0) { this.dx = 0; this.dy = 1; }
            else if (nextMove === 'ArrowLeft' && this.dx === 0) { this.dx = -1; this.dy = 0; }
            else if (nextMove === 'ArrowRight' && this.dx === 0) { this.dx = 1; this.dy = 0; }
        }
        
        let oldHead = this.snake[0];
        let head = { x: oldHead.x + this.dx, y: oldHead.y + this.dy };

        if (head.x < 0) head.x = this.tileCount - 1;
        if (head.x >= this.tileCount) head.x = 0;
        if (head.y < 0) head.y = this.tileCount - 1;
        if (head.y >= this.tileCount) head.y = 0;

        for (let segment of this.snake) {
          if (head.x === segment.x && head.y === segment.y) {
            this.shatterDeath();
            return;
          }
        }

        this.snake.unshift(head);
        
        this.snakePts.unshift({
            x: oldHead.x * this.gridSize + this.gridSize/2,
            y: oldHead.y * this.gridSize + this.gridSize/2,
            dead: false
        });

        if (head.x === this.food.x && head.y === this.food.y) {
          this.prescriptionsCollected++;
          this.pendingGrowth += 1;
          this.speedUp(1.5);
          this.updateScoreUI(false);
          
          let px = this.food.x * this.gridSize + this.gridSize/2;
          let py = this.food.y * this.gridSize + this.gridSize/2;
          this.ripples.push({ x: px, y: py, r: 5, maxR: 40, alpha: 0.6 });
          this.spawnFood();
        } 
        else if (this.syringe && head.x === this.syringe.x && head.y === this.syringe.y) {
          this.prescriptionsCollected += 5;
          this.pendingGrowth += 5;
          this.speedUp(1.5 * 5);
          this.updateScoreUI(true);
          
          let px = this.syringeSprite.x; let py = this.syringeSprite.y;
          
          // Juicier localized pop without full screen flash
          this.purpleEmitter.emitParticleAt(px, py, 25);
          this.cameras.main.shake(200, 0.008); 
          this.showFloatingText(px, py, '+5', '#a855f7');
          
          // Shockwave ring
          let shockwave = this.add.circle(px, py, 10, 0xa855f7, 0).setStrokeStyle(4, 0xa855f7, 1).setDepth(20);
          this.tweens.add({
              targets: shockwave,
              radius: 60,
              alpha: 0,
              duration: 400,
              ease: 'Cubic.easeOut',
              onComplete: () => shockwave.destroy()
          });
          
          this.syringe = null;
          this.syringeSprite.setVisible(false);
        }

        if (this.pendingGrowth > 0) this.pendingGrowth--;
        else this.snake.pop();

        while(this.snakePts.length > this.snake.length) this.snakePts.pop();

        this.snake.forEach((seg, i) => {
            let targetX = seg.x * this.gridSize + this.gridSize/2;
            let targetY = seg.y * this.gridSize + this.gridSize/2;
            let pt = this.snakePts[i];
            
            if (Math.abs(pt.x - targetX) > this.gridSize * 1.5 || Math.abs(pt.y - targetY) > this.gridSize * 1.5) {
                pt.x = targetX;
                pt.y = targetY;
            } else {
                this.tweens.add({
                    targets: pt,
                    x: targetX, y: targetY,
                    duration: this.moveTimer.delay,
                    ease: 'Linear'
                });
            }
        });
      }

      speedUp(amount) {
        let newDelay = Math.max(50, this.moveTimer.delay - amount);
        this.setSpeed(newDelay);
      }

      updateScoreUI(isMega) {
        scoreDisplay.innerText = this.prescriptionsCollected;
        if (this.prescriptionsCollected > bestScore) {
          bestScore = this.prescriptionsCollected;
          bestScoreDisplay.innerText = bestScore;
          localStorage.setItem('ssp_zen_snake_best', bestScore);
        }
        const animClass = isMega ? 'score-pop-mega' : 'score-pop';
        scoreDisplay.classList.add(animClass);
        setTimeout(() => scoreDisplay.classList.remove(animClass), 200);
      }

      shatterDeath() {
        this.isGameOver = true;
        localStorage.removeItem('ssp_zen_snake_state'); // Clear save state upon death
        if (this.moveTimer) this.moveTimer.remove();
        
        this.snakePts.forEach((pt, i) => {
           this.time.delayedCall(i * 40, () => {
               this.deathEmitter.emitParticleAt(pt.x, pt.y, 8);
               pt.dead = true;
           });
        });
        
        this.tweens.add({ targets: [this.pillLeft, this.pillRight, this.syringeSprite], alpha: 0, duration: 500 });
        this.time.delayedCall(this.snakePts.length * 40 + 600, () => this.triggerGameOver());
      }

      triggerGameOver(initial = false) {
        overlay.classList.add('visible');
        if (!initial) {
            startBtn.innerText = "Start Again";
        }
      }

      update(time, delta) {
        this.rippleLayer.clear();
        for (let i = this.ripples.length - 1; i >= 0; i--) {
            let r = this.ripples[i];
            r.r += delta * 0.1;
            r.alpha -= delta * 0.001;
            if (r.alpha <= 0 || r.r >= r.maxR) this.ripples.splice(i, 1);
            else {
                this.rippleLayer.lineStyle(2, this.isDark ? 0x38bdf8 : 0x0ea5e9, r.alpha);
                this.rippleLayer.strokeCircle(r.x, r.y, r.r);
            }
        }

        this.splineLayer.clear();
        
        let activePts = this.snakePts.filter(p => !p.dead);
        
        if (activePts.length > 1) {
            let segments = [];
            let currentSeg = [activePts[0]];
            
            for (let i = 1; i < activePts.length; i++) {
                let prev = activePts[i-1];
                let curr = activePts[i];
                if (Math.abs(prev.x - curr.x) > this.gridSize * 1.5 || Math.abs(prev.y - curr.y) > this.gridSize * 1.5) {
                    segments.push(currentSeg);
                    currentSeg = [];
                }
                currentSeg.push(curr);
            }
            segments.push(currentSeg);

            let globalPtCount = 0;
            let totalPtsEstimate = activePts.length * 4; 

            segments.forEach(seg => {
                if (seg.length < 2) {
                    let p = seg[0];
                    let isHead = (globalPtCount === 0);
                    this.splineLayer.fillStyle(isHead ? 0x22c55e : 0x16a34a, 1);
                    this.splineLayer.fillCircle(p.x, p.y, isHead ? 11 : 10);
                    globalPtCount += 4;
                    return;
                }

                let pts = seg.map(p => new Phaser.Math.Vector2(p.x, p.y));
                let curve = new Phaser.Curves.Spline(pts);
                let curvePoints = curve.getSpacedPoints(seg.length * 4);
                
                for (let i = 0; i < curvePoints.length; i++) {
                    let p = curvePoints[i];
                    let pointsFromTail = totalPtsEstimate - globalPtCount - i;
                    let taperPoints = 8; 
                    let radius = 10;
                    
                    if (pointsFromTail < taperPoints) {
                        let t = pointsFromTail / taperPoints; 
                        radius = 2 + (8 * Math.max(0, t));
                    }
                    
                    this.splineLayer.fillStyle(0x16a34a, 1);
                    if (globalPtCount === 0 && i === 0) {
                        this.splineLayer.fillStyle(0x22c55e, 1); 
                        radius = 11;
                    }
                    this.splineLayer.fillCircle(p.x, p.y, radius);
                }
                globalPtCount += curvePoints.length;
            });
        }

        this.eyesLayer.clear();
        if (activePts.length > 0 && this.food && !this.isGameOver) {
            let head = activePts[0];
            let targetX = this.food.x * this.gridSize + this.gridSize/2;
            let targetY = this.food.y * this.gridSize + this.gridSize/2;
            let angle = Phaser.Math.Angle.Between(head.x, head.y, targetX, targetY);
            
            this.blinkTimer -= delta;
            if (this.blinkTimer < -150) this.blinkTimer = Phaser.Math.Between(2000, 5000);
            let eyeScaleY = this.blinkTimer < 0 ? 0 : 1;

            let eDist = 4; let eOffset = 4;
            let lx = head.x + Math.cos(angle - Math.PI/2) * eOffset + Math.cos(angle)*eDist;
            let ly = head.y + Math.sin(angle - Math.PI/2) * eOffset + Math.sin(angle)*eDist;
            let rx = head.x + Math.cos(angle + Math.PI/2) * eOffset + Math.cos(angle)*eDist;
            let ry = head.y + Math.sin(angle + Math.PI/2) * eOffset + Math.sin(angle)*eDist;

            this.eyesLayer.fillStyle(0xffffff, 1);
            if (eyeScaleY > 0) {
                this.eyesLayer.fillCircle(lx, ly, 2.5);
                this.eyesLayer.fillCircle(rx, ry, 2.5);
                this.eyesLayer.fillStyle(0x0f172a, 1); 
                this.eyesLayer.fillCircle(lx + Math.cos(angle)*1, ly + Math.sin(angle)*1, 1);
                this.eyesLayer.fillCircle(rx + Math.cos(angle)*1, ry + Math.sin(angle)*1, 1);
            } else {
                this.eyesLayer.lineStyle(1, 0xffffff, 1);
                this.eyesLayer.beginPath();
                this.eyesLayer.moveTo(lx - 2, ly); this.eyesLayer.lineTo(lx + 2, ly);
                this.eyesLayer.moveTo(rx - 2, ry); this.eyesLayer.lineTo(rx + 2, ry);
                this.eyesLayer.strokePath();
            }
        }
      }
    }

    const config = {
      type: Phaser.AUTO,
      width: 384,
      height: 384,
      parent: 'game-container',
      transparent: true,
      resolution: window.devicePixelRatio, 
      scene: MainScene
    };

    phaserGame = new Phaser.Game(config);
    
  </script>
