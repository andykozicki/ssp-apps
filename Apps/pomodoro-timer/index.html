<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - SSP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'sterling-green': '#16a34a',
                    }
                }
            }
        }
    </script>
    
    <style>
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        
        /* Smooth SVG Progress Ring Transition */
        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Breathing Animation for Paused State */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.85; }
        }
        .animate-breathe {
            animation: breathe 2s infinite ease-in-out;
        }

        /* Star Pop Animation for Session Completion */
        @keyframes starPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.4) rotate(15deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-star {
            animation: starPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            display: inline-block;
        }

        /* Urgent 60s Pulse for Countdown Circle */
        @keyframes urgentRing {
            0%, 100% { stroke: #f59e0b; filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.4)); }
            50% { stroke: #ef4444; filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.8)); stroke-width: 10px; }
        }
        .ring-urgent {
            animation: urgentRing 1.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="w-full p-4 flex justify-between items-center">
        <a href="../index.html" class="flex items-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Dashboard
        </a>
        
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="theme-toggle" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-sterling-green"></div>
        </label>
    </div>

    <div class="flex-1 flex flex-col items-center px-4">
        
        <header class="text-center mb-8 mt-4">
            <h1 class="text-3xl font-bold tracking-tight">Pomodoro Timer</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Sterling Specialty Pharmacy Internal Tool</p>
        </header>

        <main class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow max-w-md w-full p-8 flex flex-col items-center transition-colors duration-500">
            
            <div class="relative w-64 h-64 flex justify-center items-center mb-8">
                <svg class="absolute inset-0 w-full h-full overflow-visible">
                    <circle cx="128" cy="128" r="116" stroke="currentColor" stroke-width="8" fill="transparent" class="text-gray-100 dark:text-gray-700 transition-colors duration-500" />
                    <circle id="progress-circle" cx="128" cy="128" r="116" stroke="currentColor" stroke-width="8" fill="transparent" class="progress-ring__circle text-gray-800 dark:text-gray-300" stroke-dasharray="728.85" stroke-dashoffset="0" stroke-linecap="round" />
                </svg>
                <div class="absolute flex flex-col items-center z-10">
                    <span id="phase-label" class="text-sm uppercase tracking-[0.2em] font-bold mb-1 text-gray-500 dark:text-gray-400 transition-colors duration-500">Focus</span>
                    <span id="time-display" class="text-6xl font-mono font-bold tracking-tighter transition-colors duration-500">25:00</span>
                </div>
            </div>

            <div class="flex space-x-4 mb-8 w-full justify-center h-12">
                <button id="start-btn" class="bg-gray-800 dark:bg-gray-200 text-white dark:text-gray-900 w-32 rounded font-semibold hover:bg-gray-700 dark:hover:bg-white transition-all shadow-sm">Start</button>
                <button id="pause-btn" class="hidden bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 w-32 rounded font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Pause</button>
                <button id="reset-btn" class="hidden bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 w-32 rounded font-semibold hover:bg-red-200 dark:hover:bg-red-900/50 transition-all">Reset</button>
            </div>

            <div id="session-tracker" class="mb-4 w-full flex flex-wrap items-center justify-center gap-1 min-h-[2rem]">
                </div>

            <div class="mb-6 w-full flex items-center justify-between bg-gray-50 dark:bg-gray-900 px-4 py-3 rounded border border-gray-100 dark:border-gray-700">
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Notification Sound</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="mute-toggle" class="sr-only peer">
                    <div class="w-9 h-5 bg-green-500 rounded-full peer dark:bg-green-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-gray-300 dark:peer-checked:bg-gray-600"></div>
                    <span class="ml-2 text-xs text-gray-500 font-semibold uppercase w-8" id="mute-label">ON</span>
                </label>
            </div>

            <hr class="w-full border-gray-100 dark:border-gray-700 my-2">

            <div class="w-full mt-2">
                <button id="toggle-custom-btn" class="text-xs font-semibold text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 w-full text-center py-2 transition-colors uppercase tracking-wider">
                    Custom Interval
                </button>
                
                <div id="custom-interval-section" class="hidden mt-4">
                    <div class="flex justify-between items-end mb-3">
                        <h3 class="text-sm font-bold text-gray-700 dark:text-gray-200">Set Intervals</h3>
                        <button id="save-defaults-btn" class="text-xs font-semibold text-sterling-green hover:text-green-700 dark:hover:text-green-400 transition-colors">Save as Default</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-2">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Focus (min)</label>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="focus-input" value="25" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition-shadow text-center font-mono text-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Break (min)</label>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" id="break-input" value="5" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-600 rounded bg-gray-50 dark:bg-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition-shadow text-center font-mono text-lg">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-12 mb-8 text-gray-400 text-xs text-center">
            &copy; <span id="year"></span> Sterling Specialty Pharmacy. All rights reserved.
        </footer>
    </div>

    <script>
        // --- Dark Mode Initialization ---
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Check local storage or system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            themeToggle.checked = true;
        } else {
            htmlElement.classList.remove('dark');
            themeToggle.checked = false;
        }

        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        });

        // --- Auto-updating Footer Year ---
        document.getElementById('year').textContent = new Date().getFullYear();

        // --- Pomodoro Logic ---
        let timerInterval;
        let timeLeft = 25 * 60;
        let totalPhaseTime = 25 * 60;
        let isFocusPhase = true;
        let isRunning = false;

        // DOM Elements
        const timeDisplay = document.getElementById('time-display');
        const phaseLabel = document.getElementById('phase-label');
        const progressCircle = document.getElementById('progress-circle');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const focusInput = document.getElementById('focus-input');
        const breakInput = document.getElementById('break-input');
        const sessionTracker = document.getElementById('session-tracker');
        const muteToggle = document.getElementById('mute-toggle');
        const muteLabel = document.getElementById('mute-label');
        const toggleCustomBtn = document.getElementById('toggle-custom-btn');
        const customIntervalSection = document.getElementById('custom-interval-section');
        const saveDefaultsBtn = document.getElementById('save-defaults-btn');

        const CIRCUMFERENCE = 2 * Math.PI * 116; // r=116
        progressCircle.style.strokeDasharray = `${CIRCUMFERENCE}`;

        // Load Defaults
        function loadDefaults() {
            const savedFocus = localStorage.getItem('ssp_pomodoro_focus');
            const savedBreak = localStorage.getItem('ssp_pomodoro_break');
            const savedMute = localStorage.getItem('ssp_pomodoro_mute');

            if (savedFocus) focusInput.value = savedFocus;
            if (savedBreak) breakInput.value = savedBreak;
            if (savedMute !== null) {
                muteToggle.checked = savedMute === 'true';
                updateMuteLabel();
            }
            resetTimer();
        }

        // Audio Synthesis (Web Audio API)
        function playChime() {
            if (muteToggle.checked) return;
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            // Gentle bell-like chime
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
            osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.1); // C6
            
            gainNode.gain.setValueAtTime(0, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
            
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 2);
        }

        // Timer Format
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Update UI
        function updateDisplay() {
            const formattedTime = formatTime(timeLeft);
            timeDisplay.textContent = formattedTime;
            
            // Dynamic Title
            const phaseText = isFocusPhase ? 'Focus' : 'Break';
            document.title = `(${formattedTime}) ${phaseText} - SSP`;

            // SVG Ring Math
            const offset = CIRCUMFERENCE - (timeLeft / totalPhaseTime) * CIRCUMFERENCE;
            progressCircle.style.strokeDashoffset = offset;

            // Final 60 Seconds Juice
            if (timeLeft <= 60 && timeLeft > 0 && isRunning) {
                timeDisplay.classList.add('animate-pulse');
                if (isFocusPhase) {
                    progressCircle.classList.add('ring-urgent');
                }
            } else {
                timeDisplay.classList.remove('animate-pulse');
                progressCircle.classList.remove('ring-urgent');
            }
        }

        // State Styling Shifts
        function applyPhaseStyles() {
            if (isFocusPhase) {
                phaseLabel.textContent = "Focus";
                progressCircle.classList.remove('text-sterling-green');
                progressCircle.classList.add('text-gray-800', 'dark:text-gray-300');
                phaseLabel.classList.remove('text-sterling-green', 'dark:text-sterling-green');
                phaseLabel.classList.add('text-gray-500', 'dark:text-gray-400');
            } else {
                phaseLabel.textContent = "Break";
                progressCircle.classList.remove('text-gray-800', 'dark:text-gray-300', 'ring-urgent');
                progressCircle.classList.add('text-sterling-green'); // Reward Color
                phaseLabel.classList.remove('text-gray-500', 'dark:text-gray-400');
                phaseLabel.classList.add('text-sterling-green', 'dark:text-sterling-green');
            }
        }

        // Phase Transition
        function switchPhase() {
            playChime();
            
            // Add Gold Star if finishing a Focus Phase
            if (isFocusPhase) {
                const star = document.createElement('span');
                star.textContent = '⭐';
                star.className = 'text-2xl animate-star mx-0.5';
                sessionTracker.appendChild(star);
            }
            
            isFocusPhase = !isFocusPhase;
            const newMinutes = parseInt(isFocusPhase ? focusInput.value : breakInput.value) || 0;
            totalPhaseTime = newMinutes * 60;
            timeLeft = totalPhaseTime;
            
            applyPhaseStyles();
            updateDisplay();
        }

        // Controls
        function startTimer() {
            if (isRunning) return;
            if (timeLeft <= 0) resetTimer();
            
            isRunning = true;
            startBtn.classList.add('hidden');
            startBtn.classList.remove('animate-breathe');
            pauseBtn.classList.remove('hidden');
            resetBtn.classList.remove('hidden');

            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    switchPhase();
                    // Auto-start next phase
                    setTimeout(startTimer, 1000); 
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(timerInterval);
            isRunning = false;
            
            pauseBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            startBtn.textContent = "Resume";
            startBtn.classList.add('animate-breathe');
            timeDisplay.classList.remove('animate-pulse');
            progressCircle.classList.remove('ring-urgent');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isFocusPhase = true;
            
            const mins = parseInt(focusInput.value) || 25;
            totalPhaseTime = mins * 60;
            timeLeft = totalPhaseTime;
            
            applyPhaseStyles();
            updateDisplay();
            
            startBtn.textContent = "Start";
            startBtn.classList.remove('hidden', 'animate-breathe');
            pauseBtn.classList.add('hidden');
            resetBtn.classList.add('hidden');
            document.title = "Pomodoro Timer - SSP";
        }

        function updateMuteLabel() {
            muteLabel.textContent = muteToggle.checked ? "OFF" : "ON";
        }

        // Event Listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        
        focusInput.addEventListener('change', () => { if(!isRunning && isFocusPhase) resetTimer(); });
        breakInput.addEventListener('change', () => { if(!isRunning && !isFocusPhase) resetTimer(); });
        
        muteToggle.addEventListener('change', updateMuteLabel);

        toggleCustomBtn.addEventListener('click', () => {
            customIntervalSection.classList.toggle('hidden');
            toggleCustomBtn.textContent = customIntervalSection.classList.contains('hidden') ? 'Custom Interval' : 'Hide Custom Interval';
        });

        saveDefaultsBtn.addEventListener('click', () => {
            localStorage.setItem('ssp_pomodoro_focus', focusInput.value);
            localStorage.setItem('ssp_pomodoro_break', breakInput.value);
            localStorage.setItem('ssp_pomodoro_mute', muteToggle.checked);
            
            const originalText = saveDefaultsBtn.textContent;
            saveDefaultsBtn.textContent = "Saved!";
            setTimeout(() => { saveDefaultsBtn.textContent = originalText; }, 2000);
        });

        // Initialize
        loadDefaults();

    </script>
</body>
</html>
