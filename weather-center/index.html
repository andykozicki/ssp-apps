<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Center | Sterling Specialty</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class' 
        }
    </script>
    <script>
        // Strictly adhering to SSP Dark Mode Rules for FOUC prevention
        if (localStorage.getItem('ssp-theme') === 'dark') { 
            document.documentElement.classList.add('dark'); 
        }
    </script>

    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        .accent-sterling-green { accent-color: #16a34a; }
        
        /* Custom Toggle Pill Styling */
        .toggle-checkbox:checked { right: 0; border-color: #16a34a; }
        .toggle-checkbox:checked + .toggle-label { background-color: #16a34a; }

        /* Dark Mode Map Background Overrides */
        .dark .leaflet-container { background: #1f2937; }
        .dark .leaflet-bar a { background-color: #374151; color: #f3f4f6; border-color: #4b5563; }
        .dark .leaflet-bar a:hover { background-color: #4b5563; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <!-- The Universal Top Bar -->
    <div class="w-full p-4 flex justify-between items-center">
        <a href="../index.html" class="flex items-center text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors text-sm font-medium">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Dashboard
        </a>
        
        <div class="flex items-center">
            <span class="mr-2 text-sm text-gray-500 dark:text-gray-400">Dark Mode</span>
            <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="darkModeToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-300 z-10 top-0 bottom-0 m-auto right-4"/>
                <label for="darkModeToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
            </div>
        </div>
    </div>

    <!-- Main App Centering -->
    <div class="flex-1 flex flex-col items-center px-4 w-full">
        
        <header class="mb-8 text-center w-full max-w-4xl">
            <h1 class="text-4xl font-bold tracking-tight">Weather Center</h1>
        </header>

        <main class="w-full max-w-4xl flex flex-col gap-6 mb-12">
            
            <!-- Top Data Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- AQI Card -->
                <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow w-full p-5 flex flex-col justify-between">
                    <h2 class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                        Air Quality
                    </h2>
                    <div id="aqi-container" class="flex-1 flex flex-col justify-center">
                        <div class="animate-pulse flex space-x-4">
                            <div class="flex-1 h-12 bg-gray-200 dark:bg-gray-700 rounded"></div>
                        </div>
                    </div>
                </div>

                <!-- NWS Alerts Card -->
                <div class="md:col-span-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow w-full p-5 flex flex-col">
                    <h2 class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Regional Alerts
                    </h2>
                    <div id="alert-container" class="flex-1 overflow-y-auto max-h-[150px] pr-2 custom-scrollbar">
                        <div class="animate-pulse flex space-x-4">
                            <div class="flex-1 h-12 bg-gray-200 dark:bg-gray-700 rounded mb-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Radar Map Card -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded shadow w-full overflow-hidden flex flex-col">
                <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                    <h2 class="font-bold flex items-center gap-2">
                        <svg class="w-5 h-5 text-sterling-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                        Live Radar (2-Hour Loop)
                    </h2>
                    <span id="timestamp" class="text-sm font-mono font-bold bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded">--:--</span>
                </div>
                
                <div id="weather-map" class="h-[450px] w-full z-0"></div>
                
                <!-- Radar Controls -->
                <div class="p-4 bg-gray-50 dark:bg-gray-800/50 flex flex-wrap items-center gap-6 text-sm">
                    <button id="playPauseBtn" class="bg-sterling-green hover:bg-green-700 text-white font-bold py-2 px-6 rounded transition-colors shadow-sm min-w-[100px]">
                        ⏸ Pause
                    </button>
                    
                    <div class="flex-1 flex items-center gap-3 min-w-[150px]">
                        <span class="font-medium text-gray-500 dark:text-gray-400">Speed</span>
                        <input type="range" id="speedSlider" min="1" max="19" value="15" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700 accent-sterling-green">
                    </div>
                    
                    <div class="flex-1 flex items-center gap-3 min-w-[150px]">
                        <span class="font-medium text-gray-500 dark:text-gray-400">Opacity</span>
                        <input type="range" id="opacitySlider" min="0.1" max="1" step="0.1" value="0.6" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700 accent-sterling-green">
                    </div>
                </div>
            </div>

        </main>
    </div>

    <footer class="mt-auto text-gray-400 text-xs text-center pb-6 w-full">
        <p>&copy; <span id="currentYear"></span> Sterling Specialty Pharmacy.</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Set dynamic copyright year
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // ----------------------------------------------------
        // 1. Dark Mode & Toggle Logic (Dashboard Rules)
        // ----------------------------------------------------
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');

        const isDarkMode = localStorage.getItem('ssp-theme') === 'dark' || 
                           (!('ssp-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (isDarkMode) {
            htmlElement.classList.add('dark');
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
            updateMapTheme(); // Ensure map updates without reload
        });

        // ----------------------------------------------------
        // 2. Leaflet Map Initialization
        // ----------------------------------------------------
        const map = L.map('weather-map', {
            zoomControl: false // Move zoom control for aesthetic purposes
        }).setView([44.8897, -93.146], 9);
        
        L.control.zoom({ position: 'topright' }).addTo(map);

        function getTileUrl() {
            // Light: Carto Positron. Dark: Carto Dark Matter (Avoids OSM strict referer policy)
            return document.documentElement.classList.contains('dark') ? 
                'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 
                'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        }

        let baseLayer = L.tileLayer(getTileUrl(), { 
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors & Carto'
        }).addTo(map);

        function updateMapTheme() {
            baseLayer.setUrl(getTileUrl());
        }

        // ----------------------------------------------------
        // 3. RainViewer API Logic (Specific Implementation Logic B)
        // ----------------------------------------------------
        let radarLayers = [];
        let timeLabels = [];
        let currentFrame = 0;
        let animationInterval;
        let isPlaying = true;
        let animationSpeed = 500; // default (computed from slider later)
        let radarOpacity = 0.6;

        async function fetchRadarFrames() {
            try {
                const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await res.json();
                const pastFrames = data.radar.past; // Last 2 hours
                
                // Clear existing layers if this is a refresh
                radarLayers.forEach(l => map.removeLayer(l));
                radarLayers = [];
                timeLabels = [];

                // Preload all frames as hidden layers to prevent flickering
                pastFrames.forEach((frame) => {
                    const layer = L.tileLayer(`https://tilecache.rainviewer.com/v2/radar/${frame.path}/256/{z}/{x}/{y}/2/1_1.png`, {
                        opacity: 0,
                        transparent: true,
                        zIndex: 10
                    }).addTo(map);
                    
                    radarLayers.push(layer);
                    
                    // Format UNIX timestamp to localized Time (e.g. 1:40 PM)
                    const date = new Date(frame.time * 1000);
                    timeLabels.push(date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                });
                
                if (radarLayers.length > 0) {
                    currentFrame = radarLayers.length - 1; // Start at most recent
                    radarLayers[currentFrame].setOpacity(radarOpacity);
                    document.getElementById('timestamp').innerText = timeLabels[currentFrame];
                }

                if(isPlaying) playRadar();
            } catch (e) {
                console.error("RainViewer error", e);
                document.getElementById('timestamp').innerText = "Error";
            }
        }

        function cycleRadar() {
            if (radarLayers.length === 0) return;
            const nextFrame = (currentFrame + 1) % radarLayers.length;
            
            // Hide current, show next
            radarLayers[currentFrame].setOpacity(0);
            radarLayers[nextFrame].setOpacity(radarOpacity);
            
            currentFrame = nextFrame;
            document.getElementById('timestamp').innerText = timeLabels[currentFrame];
        }

        function playRadar() {
            clearInterval(animationInterval);
            isPlaying = true;
            document.getElementById('playPauseBtn').innerHTML = '⏸ Pause';
            animationInterval = setInterval(cycleRadar, animationSpeed);
        }

        function pauseRadar() {
            clearInterval(animationInterval);
            isPlaying = false;
            document.getElementById('playPauseBtn').innerHTML = '▶ Play';
        }

        // Controls binding
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            isPlaying ? pauseRadar() : playRadar();
        });

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            // Map 1-19 slider to 2000ms - 200ms delay. (Higher slider = faster visual speed = lower delay)
            animationSpeed = (20 - parseInt(e.target.value)) * 100;
            if (isPlaying) playRadar(); // Restart interval with new speed
        });

        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            radarOpacity = parseFloat(e.target.value);
            if (radarLayers.length > 0) {
                radarLayers[currentFrame].setOpacity(radarOpacity);
            }
        });

        // ----------------------------------------------------
        // 4. National Weather Service Alerts (Specific Implementation Logic C)
        // ----------------------------------------------------
        const severityRank = {
            'Extreme': 4,
            'Severe': 3,
            'Moderate': 2,
            'Minor': 1,
            'Unknown': 0
        };

        function getAlertClass(severity) {
            if (severity === 'Extreme' || severity === 'Severe') return 'bg-red-100 dark:bg-red-900/40 border-red-500 text-red-800 dark:text-red-300 shadow-sm animate-pulse';
            if (severity === 'Moderate') return 'bg-orange-100 dark:bg-orange-900/40 border-orange-500 text-orange-800 dark:text-orange-300 shadow-sm';
            return 'bg-yellow-100 dark:bg-yellow-900/40 border-yellow-500 text-yellow-800 dark:text-yellow-300 shadow-sm';
        }

        async function fetchAlerts() {
            try {
                // Polling for Dakota, Ramsey, and Hennepin counties
                const res = await fetch('https://api.weather.gov/alerts/active?zone=MNC037,MNC123,MNC053');
                const data = await res.json();
                const features = data.features || [];
                
                // Deduplicate by Event/Headline to prevent identical alerts flooding the UI
                const uniqueAlerts = [];
                const seenHeadlines = new Set();
                
                features.forEach(f => {
                    const headline = f.properties.headline || f.properties.event;
                    if(!seenHeadlines.has(headline)) {
                        seenHeadlines.add(headline);
                        uniqueAlerts.push(f.properties);
                    }
                });

                renderAlerts(uniqueAlerts);
            } catch (e) {
                console.error("NWS Alert fetch failed", e);
                document.getElementById('alert-container').innerHTML = '<div class="text-red-500 text-sm p-2">Unable to connect to NWS Servers.</div>';
            }
        }

        function renderAlerts(features) {
            const alertBox = document.getElementById('alert-container');
            if (!features.length) {
                alertBox.innerHTML = `
                    <div class="h-full flex flex-col justify-center items-center text-center p-4">
                        <div class="text-green-600 dark:text-green-400 font-bold flex items-center gap-2 mb-1">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Clear Skies
                        </div>
                        <p class="text-xs text-gray-500 dark:text-gray-400">No active alerts reported for Dakota, Ramsey, or Hennepin counties.</p>
                    </div>`;
                return;
            }
            
            // Sort by severity index
            const sorted = features.sort((a, b) => (severityRank[b.severity] || 0) - (severityRank[a.severity] || 0));
            
            alertBox.innerHTML = sorted.map(alert => `
                <div class="p-3 mb-2 rounded border-l-4 ${getAlertClass(alert.severity)} transition-colors">
                    <h3 class="font-bold text-sm uppercase tracking-wide mb-1 flex items-center justify-between">
                        ${alert.event}
                        <span class="text-[10px] font-mono opacity-80">${alert.severity}</span>
                    </h3>
                    <p class="text-xs opacity-90 line-clamp-2" title="${alert.areaDesc}">${alert.areaDesc}</p>
                </div>
            `).join('');
        }

        // ----------------------------------------------------
        // 5. Air Quality Index (WAQI Integration)
        // ----------------------------------------------------
        async function fetchAQI() {
            try {
                // Using Mendota Heights lat/lon. "demo" token acts as a placeholder for open testing.
                const res = await fetch('https://api.waqi.info/feed/geo:44.8897;-93.146/?token=demo');
                const data = await res.json();
                
                if (data.status === 'ok') {
                    renderAQI(data.data.aqi);
                } else {
                    throw new Error(data.data);
                }
            } catch (e) {
                console.error("AQI fetch failed", e);
                document.getElementById('aqi-container').innerHTML = '<div class="text-red-500 text-sm">Failed to load AQI data. Verify API Token.</div>';
            }
        }

        function renderAQI(aqi) {
            const container = document.getElementById('aqi-container');
            let colorClass, healthText;
            
            // US EPA Standard Logic
            if (aqi <= 50) {
                colorClass = 'bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-400 border-green-200 dark:border-green-800';
                healthText = 'Good';
            } else if (aqi <= 100) {
                colorClass = 'bg-yellow-100 dark:bg-yellow-900/40 text-yellow-800 dark:text-yellow-400 border-yellow-200 dark:border-yellow-800';
                healthText = 'Moderate';
            } else if (aqi <= 150) {
                colorClass = 'bg-orange-100 dark:bg-orange-900/40 text-orange-800 dark:text-orange-400 border-orange-200 dark:border-orange-800';
                healthText = 'Sensitive Groups';
            } else if (aqi <= 200) {
                colorClass = 'bg-red-100 dark:bg-red-900/40 text-red-800 dark:text-red-400 border-red-200 dark:border-red-800';
                healthText = 'Unhealthy';
            } else {
                colorClass = 'bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-400 border-purple-200 dark:border-purple-800';
                healthText = 'Hazardous';
            }
            
            container.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-5xl font-bold tracking-tighter text-gray-900 dark:text-white">${aqi}</div>
                        <div class="text-xs font-bold uppercase mt-1 text-gray-500 dark:text-gray-400">US AQI</div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <span class="inline-block px-3 py-1.5 rounded-full text-xs font-bold border ${colorClass} text-center max-w-[120px] leading-tight">
                            ${healthText}
                        </span>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Nearest monitoring station data via WAQI.</p>
                </div>
            `;
        }

        // ----------------------------------------------------
        // Init & Polling
        // ----------------------------------------------------
        document.addEventListener("DOMContentLoaded", () => {
            fetchRadarFrames();
            fetchAlerts();
            fetchAQI();

            // Radar updates every 5 minutes (300,000ms)
            setInterval(fetchRadarFrames, 300000);
            
            // Alerts & AQI update every 15 minutes (900,000ms)
            setInterval(() => {
                fetchAlerts();
                fetchAQI();
            }, 900000);
        });

    </script>
</body>
</html>
