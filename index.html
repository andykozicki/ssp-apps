<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Specialty Pharmacy | Dev Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #07070f;
            --surface-0: #0b0b16;
            --surface-1: #0f0f1d;
            --surface-2: #141428;
            --surface-hover: #171730;
            --seam: rgba(255,255,255,0.055);
            --seam-strong: rgba(255,255,255,0.1);
            --text-primary: rgba(255,255,255,0.88);
            --text-secondary: rgba(255,255,255,0.42);
            --text-tertiary: rgba(255,255,255,0.2);
            --accent-hue: 225deg;
            --accent: rgba(110,145,255,0.9);
            --accent-dim: rgba(110,145,255,0.5);
            --accent-ghost: rgba(110,145,255,0.08);
            --accent-border: rgba(110,145,255,0.2);
            --glow-color: rgba(90,120,255,0.15);
            --speed: 0.28s;
            --ease: cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background-color: var(--void);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Noise texture overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        /* ── Hidden utility ── */
        .hidden { display: none !important; }

        /* ────────────────────────────────────────
           HEADER
        ──────────────────────────────────────── */
        .site-header {
            position: relative;
            padding: 4rem 1.5rem 3.5rem;
            text-align: center;
            overflow: hidden;
        }

        /* Radial glow behind header */
        .site-header::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse at 50% 40%, rgba(90,120,255,0.12) 0%, transparent 65%);
            pointer-events: none;
        }

        .header-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent-dim);
            margin-bottom: 0.75rem;
            position: relative;
        }

        .header-wordmark {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text-primary);
            position: relative;
        }

        .header-wordmark strong {
            font-weight: 500;
        }

        .header-sub {
            margin-top: 0.6rem;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-tertiary);
            letter-spacing: 0.06em;
            font-family: 'DM Mono', monospace;
            position: relative;
        }

        /* Thin horizontal rule below header */
        .header-rule {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--seam-strong) 20%, var(--seam-strong) 80%, transparent 100%);
            margin-bottom: 2rem;
        }

        /* ────────────────────────────────────────
           GRID
        ──────────────────────────────────────── */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--seam);
            border: 1px solid var(--seam);
            border-radius: 16px;
            overflow: hidden;
        }

        /* ────────────────────────────────────────
           TILE
        ──────────────────────────────────────── */
        .project-tile {
            background: var(--surface-0);
            position: relative;
            transition: background var(--speed) var(--ease);
        }

        .project-tile:hover {
            background: var(--surface-hover);
        }

        /* Top-edge light bleed — the signature detail */
        .project-tile::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(140,170,255,0.35) 50%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Active state */
        .project-tile.active {
            background: var(--surface-1);
        }

        .tile-header {
            padding: 1.4rem 1.4rem 1.3rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        /* Top row: icon + badge */
        .tile-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .icon-wrapper {
            width: 34px;
            height: 34px;
            color: var(--accent-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-wrapper svg {
            width: 20px;
            height: 20px;
            stroke-width: 1.5;
        }

        .tile-badge {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-dim);
            background: var(--accent-ghost);
            border: 0.5px solid var(--accent-border);
            padding: 3px 8px;
            border-radius: 20px;
            line-height: 1;
        }

        /* Title block */
        .title-wrapper h3 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .title-wrapper .subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 2px;
        }

        /* Chevron indicator */
        .tile-chevron {
            position: absolute;
            bottom: 1.3rem;
            right: 1.2rem;
            width: 16px;
            height: 16px;
            color: var(--text-tertiary);
            transition: transform var(--speed) var(--ease), color var(--speed) var(--ease);
        }

        .project-tile.active .tile-chevron {
            transform: rotate(180deg);
            color: var(--accent-dim);
        }

        /* ────────────────────────────────────────
           ACCORDION DRAWER — spans full grid row
        ──────────────────────────────────────── */
        .accordion-wrapper {
            grid-column: 1 / -1;
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--speed) var(--ease);
            background: var(--surface-2);
            border-top: 1px solid transparent;
        }

        .accordion-wrapper.open {
            grid-template-rows: 1fr;
            border-top-color: var(--seam);
        }

        .accordion-inner {
            overflow: hidden;
        }

        .details {
            padding: 1.4rem 1.6rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .details-text {
            flex: 1;
        }

        .details p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            font-weight: 400;
        }

        .details-links {
            display: flex;
            flex-direction: column;
            gap: 7px;
            flex-shrink: 0;
        }

        .btn {
            display: inline-block;
            padding: 0.48rem 1.1rem;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            white-space: nowrap;
            letter-spacing: 0.01em;
            transition: all 0.18s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background: rgba(110,145,255,0.15);
            color: rgba(170,195,255,0.9);
            border: 0.5px solid rgba(110,145,255,0.3);
        }

        .btn-primary:hover {
            background: rgba(110,145,255,0.22);
            border-color: rgba(110,145,255,0.45);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            border: 0.5px solid var(--seam-strong);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
        }

        /* ────────────────────────────────────────
           GRID CONTROLS
        ──────────────────────────────────────── */
        .grid-controls {
            text-align: center;
            margin-top: 1.5rem;
        }

        .btn-toggle {
            background: transparent;
            color: var(--text-secondary);
            border: 0.5px solid var(--seam-strong);
            padding: 0.55rem 1.6rem;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.02em;
            transition: all 0.18s ease;
        }

        .btn-toggle:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.03);
        }

        /* ────────────────────────────────────────
           FADE-IN ANIMATION
        ──────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .project-tile:not(.hidden) {
            animation: fadeUp 0.35s var(--ease) both;
        }

        /* ────────────────────────────────────────
           LOADER / ERROR
        ──────────────────────────────────────── */
        .loader-container,
        .error-container {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 1.5px solid rgba(110,145,255,0.15);
            border-radius: 50%;
            border-top-color: var(--accent-dim);
            animation: spin 0.9s ease-in-out infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-icon {
            width: 40px;
            height: 40px;
            color: rgba(255,100,100,0.6);
            margin-bottom: 1rem;
        }

        /* ────────────────────────────────────────
           FOOTER
        ──────────────────────────────────────── */
        .site-footer {
            text-align: center;
            margin-top: 3rem;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        /* ────────────────────────────────────────
           RESPONSIVE
        ──────────────────────────────────────── */
        @media (max-width: 500px) {
            .project-grid {
                grid-template-columns: 1fr;
            }

            .accordion-wrapper {
                grid-column: 1 / -1;
            }

            .details {
                flex-direction: column;
                align-items: flex-start;
            }

            .details-links {
                flex-direction: row;
                width: 100%;
            }

            .details-links .btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-eyebrow">Sterling Specialty Pharmacy</div>
        <div class="header-wordmark"><strong>Dev</strong> Apps</div>
        <div class="header-sub">Internal tools &amp; experiments</div>
    </header>

    <div class="header-rule"></div>

    <main class="container">
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Loading&hellip;</p>
        </div>

        <div id="error-state" class="error-container hidden">
            <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p id="error-message">Failed to load projects.</p>
            <button class="btn btn-secondary" style="margin-top:1rem;" onclick="window.location.reload()">Retry</button>
        </div>

        <section id="project-grid" class="project-grid hidden"></section>

        <div id="grid-controls" class="grid-controls hidden">
            <button id="toggle-view-btn" class="btn-toggle">View all tools</button>
        </div>

        <footer class="site-footer">
            <span id="project-count"></span>
        </footer>
    </main>

    <script>
        const APP_STATE = {
            projects: [],
            icons: {},
            activeProjectId: null,
            isGridExpanded: false
        };

        // Map manifest icon keys to a category label for the badge
        const CATEGORY_MAP = {
            'git-merge':    'Workflow',
            'calculator':   'Utility',
            'gamepad':      'Game',
            'trello':       'Productivity',
            'tool':         'Dev Tool',
            'activity':     'Dashboard',
            'clock':        'Productivity',
            'cpu':          'Clinical',
            'truck':        'Logistics',
            'globe':        'Web',
            'cloud':        'API',
            'play-circle':  'Game'
        };

        function getSafeUrl(urlStr) {
            try {
                const url = new URL(urlStr, window.location.origin);
                return (url.protocol === 'http:' || url.protocol === 'https:') ? url.href : '#';
            } catch {
                return urlStr.startsWith('/') ? urlStr : '#';
            }
        }

        // Each pair of featured tiles shares one accordion drawer below them.
        // For a 2-column grid we need to track open state per tile and inject
        // a full-width drawer element after every two tiles.
        function renderGrid() {
            const grid = document.getElementById('project-grid');
            grid.innerHTML = '';

            const featured = APP_STATE.projects.filter(p => p.featured);
            const secondary = APP_STATE.projects.filter(p => !p.featured);

            // Render featured tiles
            featured.forEach(project => {
                grid.appendChild(createTile(project, false));
            });

            // One shared accordion for featured section (spans full width)
            const featuredDrawer = createDrawer('featured-drawer');
            grid.appendChild(featuredDrawer);

            // Render secondary tiles (hidden by default)
            secondary.forEach(project => {
                const tile = createTile(project, true);
                tile.classList.add('secondary-card', 'hidden');
                grid.appendChild(tile);
            });

            // One shared accordion for secondary section
            const secondaryDrawer = createDrawer('secondary-drawer');
            secondaryDrawer.classList.add('secondary-card', 'hidden');
            grid.appendChild(secondaryDrawer);
        }

        function createTile(project, isSecondary) {
            const article = document.createElement('article');
            article.className = 'project-tile';
            article.dataset.id = project.id;
            article.dataset.drawer = isSecondary ? 'secondary-drawer' : 'featured-drawer';

            // Chevron SVG
            const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            chevron.setAttribute('class', 'tile-chevron');
            chevron.setAttribute('viewBox', '0 0 24 24');
            chevron.setAttribute('fill', 'none');
            chevron.setAttribute('stroke', 'currentColor');
            chevron.setAttribute('stroke-width', '1.5');
            chevron.innerHTML = '<polyline points="6 9 12 15 18 9"></polyline>';

            const header = document.createElement('div');
            header.className = 'tile-header';
            header.addEventListener('click', () => toggleProject(project.id, article.dataset.drawer));

            const topRow = document.createElement('div');
            topRow.className = 'tile-top-row';

            const iconWrapper = document.createElement('div');
            iconWrapper.className = 'icon-wrapper';
            iconWrapper.innerHTML = APP_STATE.icons[project.icon] || APP_STATE.icons['default'] || '';

            const badge = document.createElement('span');
            badge.className = 'tile-badge';
            badge.textContent = CATEGORY_MAP[project.icon] || project.subtitle;

            topRow.appendChild(iconWrapper);
            topRow.appendChild(badge);

            const titleWrapper = document.createElement('div');
            titleWrapper.className = 'title-wrapper';

            const title = document.createElement('h3');
            title.textContent = project.title;

            const subtitle = document.createElement('span');
            subtitle.className = 'subtitle';
            subtitle.textContent = project.subtitle;

            titleWrapper.appendChild(title);
            titleWrapper.appendChild(subtitle);

            header.appendChild(topRow);
            header.appendChild(titleWrapper);
            article.appendChild(header);
            article.appendChild(chevron);

            return article;
        }

        function createDrawer(id) {
            const wrapper = document.createElement('div');
            wrapper.className = 'accordion-wrapper';
            wrapper.id = id;

            const inner = document.createElement('div');
            inner.className = 'accordion-inner';

            const details = document.createElement('div');
            details.className = 'details';

            const detailsText = document.createElement('div');
            detailsText.className = 'details-text';

            const desc = document.createElement('p');
            desc.id = id + '-desc';
            detailsText.appendChild(desc);

            const linksCol = document.createElement('div');
            linksCol.className = 'details-links';

            const appLink = document.createElement('a');
            appLink.className = 'btn btn-primary';
            appLink.id = id + '-app';
            appLink.textContent = 'Launch App';
            appLink.target = '_blank';
            appLink.rel = 'noopener noreferrer';

            const repoLink = document.createElement('a');
            repoLink.className = 'btn btn-secondary';
            repoLink.id = id + '-repo';
            repoLink.textContent = 'Source Code';
            repoLink.target = '_blank';
            repoLink.rel = 'noopener noreferrer';

            linksCol.appendChild(appLink);
            linksCol.appendChild(repoLink);
            details.appendChild(detailsText);
            details.appendChild(linksCol);
            inner.appendChild(details);
            wrapper.appendChild(inner);

            return wrapper;
        }

        function toggleProject(id, drawerId) {
            const allTiles = document.querySelectorAll('.project-tile');
            const drawer = document.getElementById(drawerId);
            const project = APP_STATE.projects.find(p => p.id === id);

            // If clicking the already-active tile, close the drawer
            if (APP_STATE.activeProjectId === id) {
                APP_STATE.activeProjectId = null;
                allTiles.forEach(t => t.classList.remove('active'));
                closeDrawer(drawer);
                return;
            }

            // Close any other open drawers
            ['featured-drawer', 'secondary-drawer'].forEach(did => {
                if (did !== drawerId) {
                    const d = document.getElementById(did);
                    if (d) closeDrawer(d);
                }
            });

            // Deactivate all tiles
            allTiles.forEach(t => t.classList.remove('active'));

            // Activate this tile
            APP_STATE.activeProjectId = id;
            const activeTile = document.querySelector(`.project-tile[data-id="${id}"]`);
            if (activeTile) activeTile.classList.add('active');

            // Populate drawer content
            if (project && drawer) {
                document.getElementById(drawerId + '-desc').textContent = project.description;
                const appBtn = document.getElementById(drawerId + '-app');
                const repoBtn = document.getElementById(drawerId + '-repo');
                appBtn.href = getSafeUrl(project.appUrl);
                repoBtn.href = getSafeUrl(project.repoUrl);
                openDrawer(drawer);
            }
        }

        function openDrawer(drawer) {
            drawer.classList.add('open');
        }

        function closeDrawer(drawer) {
            drawer.classList.remove('open');
        }

        function toggleGridVisibility() {
            APP_STATE.isGridExpanded = !APP_STATE.isGridExpanded;
            const secondaryCards = document.querySelectorAll('.secondary-card');
            const btn = document.getElementById('toggle-view-btn');

            if (!APP_STATE.isGridExpanded) {
                // Close secondary drawer if open
                const secDrawer = document.getElementById('secondary-drawer');
                if (secDrawer) closeDrawer(secDrawer);
                // If active project is secondary, deactivate it
                const activeTile = document.querySelector(`.project-tile[data-id="${APP_STATE.activeProjectId}"]`);
                if (activeTile && activeTile.classList.contains('secondary-card')) {
                    APP_STATE.activeProjectId = null;
                    activeTile.classList.remove('active');
                }
            }

            secondaryCards.forEach(card => {
                if (APP_STATE.isGridExpanded) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            btn.textContent = APP_STATE.isGridExpanded ? 'Show less' : 'View all tools';
        }

        async function init() {
            const loader = document.getElementById('loader');
            const errorState = document.getElementById('error-state');
            const grid = document.getElementById('project-grid');
            const controls = document.getElementById('grid-controls');
            const countEl = document.getElementById('project-count');

            try {
                const response = await fetch('manifest.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (!data.projects || !Array.isArray(data.projects)) throw new Error('Invalid manifest schema');

                APP_STATE.projects = data.projects;
                APP_STATE.icons = data.icons || {};

                renderGrid();

                loader.classList.add('hidden');
                grid.classList.remove('hidden');

                const total = data.projects.length;
                const featuredCount = data.projects.filter(p => p.featured).length;
                countEl.textContent = `${total} tools · ${featuredCount} featured`;

                const hasSecondary = data.projects.some(p => !p.featured);
                if (hasSecondary) {
                    controls.classList.remove('hidden');
                    document.getElementById('toggle-view-btn').addEventListener('click', toggleGridVisibility);
                }

            } catch (error) {
                console.error('Failed to load projects:', error);
                loader.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
