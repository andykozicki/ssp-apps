    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'sterling-green': '#16a34a',
                    },
                    animation: {
                        'breathe': 'breathe 4s ease-in-out infinite',
                    },
                    keyframes: {
                        breathe: {
                            '0%, 100%': { opacity: '0.3', transform: 'scale(0.95)' },
                            '50%': { opacity: '1', transform: 'scale(1.1)' },
                        }
                    }

            }
        }

    <script>
        // STRICT FOUC PREVENTION (Executes before DOM render)
        if (localStorage.getItem('ssp-theme') === 'dark' || !('ssp-theme' in localStorage)) { 
            document.documentElement.classList.add('dark'); 
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <script src="registry.js"></script>
    
    <style>
        /* Anti-Transition Flash Class */
        .preload * {
            -webkit-transition: none !important;
            -moz-transition: none !important;
            -ms-transition: none !important;
            -o-transition: none !important;
            transition: none !important;
        }

        :root {
            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shine: rgba(0, 0, 0, 0.03);
            --glass-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        html.dark {
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shine: rgba(22, 163, 74, 0.12); /* Heavy Sterling Green Shine */
            --glass-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            transition: background-color 0.5s ease; 
        }

        /* SMART GLASS TILE ENGINE (Cupertino 2050 - Square Density) */
        .app-tile {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1), border-color 0.3s ease, background 0.3s ease, opacity 0.2s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .app-tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                var(--glass-shine), 
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        .app-tile:hover {
            transform: translateY(-4px) scale(1.03);
            border-color: rgba(22, 163, 74, 0.5); 
            background: html.dark ? rgba(22, 163, 74, 0.04) : rgba(22, 163, 74, 0.05);
            box-shadow: 0 10px 25px -5px rgba(22, 163, 74, 0.25);
            z-index: 20;
        }
        
        .app-tile:hover::before { opacity: 1; }

        /* TOGGLE UI */
        .toggle-checkbox { left: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .toggle-checkbox:checked { left: 16px; border-color: #16a34a; } 
        .toggle-checkbox:checked + .toggle-label { background-color: #16a34a; box-shadow: 0 0 12px rgba(22, 163, 74, 0.5); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(22, 163, 74, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(22, 163, 74, 0.5); }
    </style>
</head>

    <script>
        // Disable FOUC lock post-render
        window.addEventListener('load', () => document.body.classList.remove('preload'));
        
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // --- 1. OS THEME CONTROLLER ---
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');

        if (htmlElement.classList.contains('dark')) {
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        // --- 2. NETWORK TELEMETRY ---
        function updateNetworkStatus() {
            const statusText = document.getElementById('net-status-text');
            const pingText = document.getElementById('net-ping-text');
            const statusTip = document.getElementById('net-status-tip');
            const downTip = document.getElementById('net-down-tip');
            const typeTip = document.getElementById('net-type-tip');
            const pingRing = document.getElementById('net-ping-ring');

            if (!navigator.onLine) {
                statusText.textContent = 'NO SIGNAL';
                statusText.className = 'text-red-500 font-bold';
                pingText.textContent = 'Offline';
                pingRing.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.8)] animate-pulse';
                
                statusTip.textContent = 'Offline';
                statusTip.className = 'font-semibold text-red-500';
                downTip.textContent = '0 Mbps';
                typeTip.textContent = 'None';
                return;
            }

            if (navigator.connection) {
                const conn = navigator.connection;
                const rtt = conn.rtt;
                let down = conn.downlink;
                const type = conn.effectiveType;

                statusText.textContent = 'SYS.ONLINE';
                statusText.className = 'text-slate-500 dark:text-slate-400 font-medium';
                pingText.textContent = rtt + ' ms';
                statusTip.textContent = 'Online';
                downTip.textContent = (down >= 10 ? '10+ Mbps' : down + ' Mbps');
                typeTip.textContent = type;

                if (rtt > 300 || down < 0.5 || type === '2g' || type === 'slow-2g') {
                    pingRing.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.8)] animate-pulse';
                    statusTip.className = 'font-semibold text-red-500';
                } else if (rtt > 150 || down < 2 || type === '3g') {
                    pingRing.className = 'w-1.5 h-1.5 rounded-full bg-yellow-500 shadow-[0_0_12px_rgba(234,179,8,0.8)] animate-pulse';
                    statusTip.className = 'font-semibold text-yellow-500';
                } else {
                    pingRing.className = 'w-1.5 h-1.5 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-breathe';
                    statusTip.className = 'font-semibold text-green-500';
                }
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        if (navigator.connection) navigator.connection.addEventListener('change', updateNetworkStatus);

        // --- 3. TOMORROW.IO METEOROLOGICAL PIPELINE ---
        async function fetchWeather() {
            const weatherContainer = document.getElementById('weatherContainer');
            const CACHE_KEY = 'ssp_weather_v2.2';
            const TTL = 300000; // 5 Minutes strict caching limit per Tomorrow.io Protocol

            const codeMap = {
                1000: "☀️", 1100: "🌤", 1101: "⛅", 1102: "☁️", 1001: "☁️",
                2000: "🌫️", 2100: "🌫️", 4000: "🌧", 4001: "🌧", 4200: "🌧", 
                4201: "🌧", 5000: "❄️", 5001: "❄️", 5100: "❄️", 5101: "❄️",
                6000: "🌧", 6001: "🌧", 6200: "🌧", 6201: "🌧", 7000: "❄️",
                7101: "❄️", 7102: "❄️", 8000: "⛈"
            };

            function renderWeather(data) {
                try {
                    // Protocol Enforcement: Robust Array/Object Extraction
                    const timelines = data.timelines ? data.timelines : data.data?.timelines;
                    if (!timelines) throw new Error('Schema Failure: Missing Timelines');
                    
                    const minutely = timelines.minutely || (Array.isArray(timelines) ? (timelines.find(t => t.timestep === '1m' || t.timestep === 'current')?.intervals || timelines[0].intervals) : []);
                    const daily = timelines.daily || (Array.isArray(timelines) ? (timelines.find(t => t.timestep === '1d')?.intervals || timelines[1]?.intervals || timelines[0].intervals) : []);
                    
                    if (!minutely.length || !daily.length) throw new Error('Schema Failure: Empty Arrays');

                    const currentVals = minutely[0].values;
                    const currentTemp = Math.round(currentVals.temperature || 0);
                    const currentCode = currentVals.weatherCode || 1000;
                    const currentIcon = codeMap[currentCode] || '🌤';

                    document.getElementById('miniWeatherIcon').textContent = currentIcon;
                    document.getElementById('miniWeatherTemp').textContent = currentTemp + '°';
                    document.getElementById('miniWeather').classList.remove('hidden');
                    document.getElementById('miniWeather').classList.add('flex');

                    let weatherHTML = '<div class="flex flex-wrap sm:flex-nowrap justify-between gap-4 w-full">';
                    
                    for (let i = 0; i < 5 && i < daily.length; i++) {
                        const dayData = daily[i];
                        // Safety fallback for start time formatting
                        const date = new Date(dayData.time || dayData.startTime);
                        let dayName = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                        if (i === 0) dayName = 'TDA';
                        
                        const vals = dayData.values;
                        const maxTemp = Math.round(vals.temperatureMax || vals.temperature || 0);
                        const minTemp = Math.round(vals.temperatureMin || vals.temperature || 0);
                        const code = vals.weatherCodeMax || vals.weatherCodeMin || vals.weatherCode || 1000;
                        const precipProb = vals.precipitationProbabilityMax || vals.precipitationProbability || 0;
                        
                        const icon = codeMap[code] || '🌤';

                        const precipDisplay = precipProb > 20 
                            ? `<div class="text-[10px] text-blue-500 dark:text-blue-400 font-bold flex items-center mt-2 tracking-widest"><svg class="w-3 h-3 mr-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.5c-3.033 0-5.5-2.467-5.5-5.5 0-2.333 1.583-4.833 5.5-9.833 3.917 5 5.5 7.5 5.5 9.833 0 3.033-2.467 5.5-5.5 5.5z"/></svg>${precipProb}%</div>`
                            : `<div class="text-[10px] opacity-0 mt-2">0%</div>`;

                        weatherHTML += `
                            <div class="flex flex-col items-center flex-1 py-2 sm:py-4 w-[30%] sm:w-auto">
                                <span class="text-xs text-slate-500 uppercase tracking-[0.2em] mb-2 sm:mb-3">${dayName}</span>
                                <span class="text-3xl mb-2 sm:mb-3 drop-shadow-md">${icon}</span>
                                <div class="flex items-baseline gap-2 font-mono">
                                    <span class="text-lg text-slate-800 dark:text-slate-200 font-medium group-hover:text-sterling-green transition-colors">${maxTemp}°</span>
                                    <span class="text-xs text-slate-400 dark:text-slate-500">${minTemp}°</span>
                                </div>
                                ${precipDisplay}
                            </div>
                        `;
                    }
                    
                    weatherContainer.innerHTML = weatherHTML + '</div>';

                } catch (e) {
                    console.error("Render Schema Failed", e);
                    weatherContainer.innerHTML = `<div class="text-red-500 dark:text-red-400 font-bold tracking-widest text-xs">SCHEMA PARSE FAILURE</div>`;
                }
            }

            const cached = sessionStorage.getItem(CACHE_KEY);
            if (cached) {
                const { timestamp, data } = JSON.parse(cached);
                if (Date.now() - timestamp < TTL) {
                    return renderWeather(data);
                }
            }

            try {
                const res = await fetch('https://kzick-weather.askozicki.workers.dev?lat=44.8897&lon=-93.146');
                if (!res.ok) throw new Error(`Proxy Connection Refused: ${res.status}`);
                
                const rawData = await res.json();
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: rawData }));
                renderWeather(rawData);

            } catch (error) {
                console.error("Pipeline failure:", error);
                weatherContainer.innerHTML = `<div class="text-red-500 dark:text-red-400 font-bold tracking-widest text-xs">PIPELINE UNREACHABLE</div>`;
            }
        }

        // --- 4. REGISTRY INTERCEPT & RENDER PIPELINE ---
        
        // 2050 Ultra-thin SVG Overrides for Clinical Hub Elements
        const iconOverrides = {
            'clinical-hub': '<path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.3"/>',
            'workflow': '<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />',
            'pharm-flow': '<path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />'
        };

        const folderData = {
            'links': {
                title: 'System Links',
                links: [
                    { name: 'andykozicki/ssp-apps', url: 'https://github.com/andykozicki/ssp-apps' },
                    { name: 'Kzick Dashboard Repo', url: 'https://github.com/kzick001/dashboard' },
                    { name: 'Weather Worker Pipeline', url: 'https://dash.cloudflare.com/b161c0d78599ee2ead9d5aa4a03d1c40/workers/services/view/kzick-weather/production' },
                    { name: 'Personal Dash Live', url: 'https://kzick001.github.io/dashboard/' }
                ]
            }
        };

        const modal = document.getElementById('folderModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalLinks = document.getElementById('modalLinks');
        
        function openModal(folderId) {
            const data = folderData[folderId];
            if (!data) return;
            
            modalTitle.textContent = data.title;
            modalLinks.innerHTML = data.links.map(link => `
                <a href="${link.url}" target="_blank" class="px-4 py-3 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 bg-black/5 hover:bg-black/10 dark:bg-white/5 dark:hover:bg-white/10 dark:hover:text-white transition-all flex items-center justify-between border border-transparent dark:border-white/5 hover:border-black/10 dark:hover:border-sterling-green/30 hover:shadow-[0_0_15px_rgba(22,163,74,0.1)] group">
                    ${link.name} <span class="text-slate-400 group-hover:text-sterling-green transition-colors text-xs">↗</span>
                </a>
            `).join('');
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                });
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);

        // --- 5. INITIALIZATION & SMART GLASS PHYSICS ---
        function attachSmartGlassListeners() {
            document.querySelectorAll('.app-tile').forEach(tile => {
                tile.addEventListener('mousemove', e => {
                    const rect = tile.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    tile.style.setProperty('--mouse-x', `${x}px`);
                    tile.style.setProperty('--mouse-y', `${y}px`);
                });
            });
        }

        function setupDragAndDrop() {
            const board = document.getElementById('appGrid');
            let draggedItem = null;
            let isDragging = false;

            board.addEventListener('dragstart', e => {
                const tile = e.target.closest('.app-tile');
                if(!tile) return;
                isDragging = true;
                draggedItem = tile;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', tile.getAttribute('data-id') || 'tile'); 
                setTimeout(() => draggedItem.style.opacity = '0.3', 0);
            });

            board.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });

            board.addEventListener('drop', e => {
                e.preventDefault();
                const targetItem = e.target.closest('.app-tile');
                if (targetItem && draggedItem && targetItem !== draggedItem) {
                    const nodes = Array.from(board.children);
                    const draggedIdx = nodes.indexOf(draggedItem);
                    const targetIdx = nodes.indexOf(targetItem);
                    
                    if (draggedIdx < targetIdx) targetItem.after(draggedItem);
                    else targetItem.before(draggedItem);
                    
                    const newOrder = Array.from(board.children).map(t => t.getAttribute('data-id'));
                    localStorage.setItem('ssp_grid_v2', JSON.stringify(newOrder));
                }
                if(draggedItem) draggedItem.style.opacity = '1';
            });

            board.addEventListener('dragend', () => {
                if(draggedItem) draggedItem.style.opacity = '1';
                draggedItem = null;
                setTimeout(() => { isDragging = false; }, 100);
            });

            board.addEventListener('click', e => {
                if (isDragging) return;
                const folderTile = e.target.closest('[data-folder]');
                if (folderTile) openModal(folderTile.getAttribute('data-folder'));
            });
        }

        function restoreLayout() {
            const savedLayout = localStorage.getItem('ssp_grid_v2');
            if (savedLayout) {
                try {
                    const order = JSON.parse(savedLayout);
                    const board = document.getElementById('appGrid');
                    if(board) {
                        const tiles = Array.from(board.children);
                        const tileMap = {};
                        tiles.forEach(t => tileMap[t.getAttribute('data-id')] = t);
                        
                        order.forEach(id => { if (tileMap[id]) board.appendChild(tileMap[id]); });
                        tiles.forEach(t => { if (!order.includes(t.getAttribute('data-id'))) board.appendChild(t); });
                    }
                } catch(e) { console.error("Grid Restore Failed", e); }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const appGrid = document.getElementById('appGrid');
            
            if (typeof appRegistry !== 'undefined') {
                appGrid.innerHTML = '';
                
                const auxApps = ['pomodoro-timer', 'sports-network', 'zen-snake'];
                
                appRegistry.forEach(app => {
                    // Exclude weather standalone widget
                    if (app.id === 'weather-center') return;

                    // Intercept and push non-clinical tools to modal
                    if (auxApps.includes(app.id)) {
                        folderData.links.push({
                            name: app.name,
                            url: app.folder.startsWith('http') ? app.folder : `${app.folder}/index.html`
                        });
                        return;
                    }

                    // Render core clinical tools strictly overriding registry.js SVGs to prevent viewBox collisions
                    const isExternal = app.folder.startsWith('http');
                    const target = isExternal ? 'target="_blank" rel="noopener noreferrer"' : '';
                    const href = isExternal ? app.folder : `${app.folder}/index.html`;
                    
                    const svgAsset = iconOverrides[app.id] || '<path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />';
                    const sizeClass = app.id === 'clinical-hub' ? 'w-14 h-14 sm:w-16 sm:h-16' : 'w-10 h-10 sm:w-12 sm:h-12';

                    const cardHTML = `
                        <a href="${href}" ${target} data-id="${app.id}" draggable="true" class="app-tile group flex flex-col items-center justify-center p-4 rounded-[2rem] backdrop-blur-3xl overflow-hidden aspect-square">
                            <div class="text-slate-400 group-hover:text-sterling-green transition-colors duration-500 mb-3">
                                <svg class="${sizeClass} drop-shadow-sm" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                                    ${svgAsset}
                                </svg>
                            </div>
                            <span class="text-xs sm:text-sm font-medium tracking-wide text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors text-center px-1">${app.name}</span>
                        </a>
                    `;
                    appGrid.insertAdjacentHTML('beforeend', cardHTML);
                });

                // Explicitly inject System Links Tile
                const linksTile = `
                    <div data-id="system-links" data-folder="links" draggable="true" class="app-tile group flex flex-col items-center justify-center p-4 rounded-[2rem] backdrop-blur-3xl overflow-hidden aspect-square select-none">
                        <div class="text-slate-400 group-hover:text-sterling-green transition-colors duration-500 mb-3 pointer-events-none">
                            <svg class="w-10 h-10 sm:w-12 sm:h-12 drop-shadow-sm" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"></path></svg>
                        </div>
                        <span class="text-xs sm:text-sm font-medium tracking-wide text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors text-center px-1 pointer-events-none">System Links</span>
                    </div>
                `;
                appGrid.insertAdjacentHTML('beforeend', linksTile);

            } else {
                appGrid.innerHTML = `
                    <div class="col-span-full text-center text-red-500 font-mono tracking-widest text-xs p-8 rounded-[2rem] border border-red-500/20 bg-red-500/5">
                        CRITICAL ERROR: REGISTRY.JS NOT FOUND
                    </div>
                `;
            }

            restoreLayout();
            attachSmartGlassListeners();
            setupDragAndDrop();

            updateNetworkStatus();
            fetchWeather();
        });
    </script>
</body>
</html>
