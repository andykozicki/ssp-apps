<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sterling Specialty</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M 15 75 A 35 35 0 0 1 85 75%22 fill=%22none%22 stroke=%22%2316a34a%22 stroke-width=%2212%22 stroke-linecap=%22round%22/><circle cx=%2250%22 cy=%2275%22 r=%2210%22 fill=%22%2316a34a%22/><line x1=%2250%22 y1=%2275%22 x2=%2270%22 y2=%2245%22 stroke=%22%2316a34a%22 stroke-width=%228%22 stroke-linecap=%22round%22/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class' 
        }
    </script>
    <script>
        // Strictly adhering to SSP Dark Mode Rules for FOUC prevention
        if (localStorage.getItem('ssp-theme') === 'dark') { 
            document.documentElement.classList.add('dark'); 
        }
    </script>
    
    <script src="registry.js"></script>
    
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .sterling-green { color: #16a34a; }
        .bg-sterling-green { background-color: #16a34a; }
        
        /* Card Hover Animations */
        .hover-scale { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
        .hover-scale:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* Custom Toggle Pill Styling */
        .toggle-checkbox:checked { right: 0; border-color: #16a34a; }
        .toggle-checkbox:checked + .toggle-label { background-color: #16a34a; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <div class="hidden bg-orange-100 dark:bg-orange-900/40 text-orange-800 dark:text-orange-300 bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-300 bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-300 bg-yellow-100 dark:bg-yellow-900/40 text-yellow-800 dark:text-yellow-300 bg-pink-100 dark:bg-pink-900/40 text-pink-800 dark:text-pink-300 bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-300 bg-orange-50 dark:bg-orange-900/20 border-orange-300 dark:border-orange-700 bg-red-400 bg-red-500 bg-yellow-400 bg-yellow-500 bg-green-400 bg-green-500"></div>

    <div class="w-full p-4 flex justify-between items-center">
        <div class="relative flex items-center gap-2 text-sm font-bold text-gray-600 dark:text-gray-300 cursor-help group">
            <div class="relative flex h-3 w-3">
              <span id="net-ping-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span id="net-ping-dot" class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </div>
            <span id="net-ping-text">-- ms</span>

            <div class="absolute left-0 top-full mt-2 w-48 bg-gray-800 dark:bg-gray-700 text-white text-xs rounded-lg shadow-lg p-3 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">
                <div class="font-bold border-b border-gray-600 pb-1 mb-2">Network Diagnostics</div>
                <div class="flex justify-between"><span>Status:</span> <span id="net-status-tip" class="font-semibold text-green-400">Online</span></div>
                <div class="flex justify-between mt-1.5"><span>Downlink:</span> <span id="net-down-tip" class="font-semibold">-- Mbps</span></div>
                <div class="flex justify-between mt-1.5"><span>Connection:</span> <span id="net-type-tip" class="font-semibold uppercase">--</span></div>
            </div>
        </div>

        <div class="flex items-center gap-6">
            
            <div id="miniWeather" class="hidden flex items-center text-gray-700 dark:text-gray-300 font-medium bg-white dark:bg-gray-800 px-3 py-1 rounded-full shadow-sm border border-gray-200 dark:border-gray-700">
                <span id="miniWeatherIcon" class="text-lg mr-1.5"></span>
                <span id="miniWeatherTemp" class="text-sm"></span>
            </div>

            <div class="flex items-center">
                <span class="mr-2 text-sm text-gray-500 dark:text-gray-400">Dark Mode</span>
                <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="darkModeToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-300 z-10 top-0 bottom-0 m-auto right-4"/>
                    <label for="darkModeToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-4 w-full">
        
        <header class="mb-12 text-center w-full max-w-6xl">
            <h1 class="text-4xl font-bold tracking-tight mb-2">Dashboard</h1>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Sterling Specialty Pharmacy Internal Tool</p>
        </header>

        <main class="w-full max-w-6xl flex flex-col gap-8">
            
            <div id="appGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>

            <div class="w-full bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 hover-scale">
                <div class="flex items-center mb-4">
                    <div class="bg-blue-100 dark:bg-blue-900/30 p-3 rounded-lg mr-4">
                        <svg class="w-6 h-6 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Mendota Heights Forecast</h2>
                        <p class="text-gray-600 dark:text-gray-400 text-sm">5-Day Outlook</p>
                    </div>
                </div>
                
                <div id="weatherContainer" class="w-full min-h-[100px] flex items-center justify-center">
                    <div class="animate-pulse flex space-x-4 w-full">
                        <div class="flex-1 h-20 bg-gray-200 dark:bg-gray-700 rounded"></div>
                        <div class="flex-1 h-20 bg-gray-200 dark:bg-gray-700 rounded hidden sm:block"></div>
                        <div class="flex-1 h-20 bg-gray-200 dark:bg-gray-700 rounded hidden sm:block"></div>
                        <div class="flex-1 h-20 bg-gray-200 dark:bg-gray-700 rounded hidden sm:block"></div>
                        <div class="flex-1 h-20 bg-gray-200 dark:bg-gray-700 rounded hidden sm:block"></div>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <footer class="mt-12 text-gray-400 text-xs text-center pb-6 w-full">
        <p>&copy; <span id="currentYear"></span> Sterling Specialty Pharmacy. Internal Use Only.</p>
    </footer>

    <script>
        // Set dynamic copyright year
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Dark Mode Logic conforming to ssp-dashboard-rules.md
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');

        const isDarkMode = localStorage.getItem('ssp-theme') === 'dark' || 
                           (!('ssp-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (isDarkMode) {
            htmlElement.classList.add('dark');
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        // --- Network Health Logic ---
        function updateNetworkStatus() {
            const pingText = document.getElementById('net-ping-text');
            const statusTip = document.getElementById('net-status-tip');
            const downTip = document.getElementById('net-down-tip');
            const typeTip = document.getElementById('net-type-tip');

            if (!navigator.onLine) {
                pingText.textContent = 'Offline';
                setNetColors('bg-red-400', 'bg-red-500', false);
                statusTip.textContent = 'Offline';
                statusTip.className = 'font-semibold text-red-400';
                downTip.textContent = '0 Mbps';
                typeTip.textContent = 'None';
                return;
            }

            // Chromium/Edge Network Information API
            if (navigator.connection) {
                const conn = navigator.connection;
                const rtt = conn.rtt; // Estimated Ping in ms
                let down = conn.downlink; // Estimated Downlink in Mbps (Maxes at 10 in Chrome)
                const type = conn.effectiveType; // '4g', '3g', etc.

                // Format downlink text to indicate the 10Mbps cap
                const downText = down >= 10 ? '10+ Mbps' : down + ' Mbps';

                pingText.textContent = rtt + ' ms';
                statusTip.textContent = 'Online';
                downTip.textContent = downText;
                typeTip.textContent = type;

                // Adjusted Real-World Threshold Logic
                if (rtt > 300 || down < 0.5 || type === '2g' || type === 'slow-2g') {
                    // Critical: Severe latency or practically no bandwidth
                    setNetColors('bg-red-400', 'bg-red-500', true); 
                    statusTip.className = 'font-semibold text-red-400';
                } else if (rtt > 150 || down < 2 || type === '3g') {
                    // Warning: Noticeable slowdowns
                    setNetColors('bg-yellow-400', 'bg-yellow-500', true); 
                    statusTip.className = 'font-semibold text-yellow-400';
                } else {
                    // Optimal: Healthy web-layer response times
                    setNetColors('bg-green-400', 'bg-green-500', true); 
                    statusTip.className = 'font-semibold text-green-400';
                }
            } else {
                // Fallback for browsers without navigator.connection (Safari/Firefox)
                pingText.textContent = 'Online';
                setNetColors('bg-green-400', 'bg-green-500', true);
                statusTip.textContent = 'Online';
                statusTip.className = 'font-semibold text-green-400';
                downTip.textContent = 'N/A (Browser unsupported)';
                typeTip.textContent = 'N/A';
            }
        }

        function setNetColors(ringColor, dotColor, isPulsing) {
            const ring = document.getElementById('net-ping-ring');
            const dot = document.getElementById('net-ping-dot');
            
            ring.className = `absolute inline-flex h-full w-full rounded-full opacity-75 ${ringColor} ${isPulsing ? 'animate-ping' : 'hidden'}`;
            dot.className = `relative inline-flex rounded-full h-3 w-3 ${dotColor}`;
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        if (navigator.connection) {
            navigator.connection.addEventListener('change', updateNetworkStatus);
        }

        // --- Fetch Weather ---
        async function fetchWeather() {
            const weatherContainer = document.getElementById('weatherContainer');
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.8897&longitude=-93.146&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=America%2FChicago&temperature_unit=fahrenheit');
                
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                const currentTemp = Math.round(data.current.temperature_2m);
                const currentCode = data.current.weathercode;
                
                let currentIcon = '☀️';
                if (currentCode >= 1 && currentCode <= 3) currentIcon = '⛅';
                if (currentCode >= 45 && currentCode <= 48) currentIcon = '🌫️';
                if (currentCode >= 51 && currentCode <= 67) currentIcon = '🌧️';
                if (currentCode >= 71 && currentCode <= 77) currentIcon = '❄️';
                if (currentCode >= 80 && currentCode <= 82) currentIcon = '🌦️';
                if (currentCode >= 95 && currentCode <= 99) currentIcon = '⛈️';

                document.getElementById('miniWeatherIcon').textContent = currentIcon;
                document.getElementById('miniWeatherTemp').textContent = currentTemp + '°F';
                document.getElementById('miniWeather').classList.remove('hidden');

                let weatherHTML = '<div class="flex flex-col sm:flex-row justify-between gap-4 w-full">';
                
                for (let i = 0; i < 5; i++) {
                    const dateStr = data.daily.time[i] + 'T00:00:00';
                    const date = new Date(dateStr);
                    
                    let dayName = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                    if (i === 0) dayName = 'Today';
                    
                    const dateFormatted = new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric' }).format(date);
                    const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
                    const minTemp = Math.round(data.daily.temperature_2m_min[i]);
                    const code = data.daily.weathercode[i];
                    const precipProb = data.daily.precipitation_probability_max[i];
                    
                    let icon = '☀️';
                    if (code >= 1 && code <= 3) icon = '⛅';
                    if (code >= 45 && code <= 48) icon = '🌫️';
                    if (code >= 51 && code <= 67) icon = '🌧️';
                    if (code >= 71 && code <= 77) icon = '❄️';
                    if (code >= 80 && code <= 82) icon = '🌦️';
                    if (code >= 95 && code <= 99) icon = '⛈️';

                    const precipDisplay = precipProb > 20 
                        ? `<div class="text-xs text-blue-500 dark:text-blue-400 font-bold flex items-center mt-1" title="Precipitation Probability"><svg class="w-3 h-3 mr-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.5c-3.033 0-5.5-2.467-5.5-5.5 0-2.333 1.583-4.833 5.5-9.833 3.917 5 5.5 7.5 5.5 9.833 0 3.033-2.467 5.5-5.5 5.5z"/></svg>${precipProb}%</div>`
                        : `<div class="text-xs opacity-0 mt-1">0%</div>`;

                    weatherHTML += `
                        <div class="flex flex-col items-center justify-center p-3 rounded-lg bg-gray-50 dark:bg-gray-700/50 flex-1 border border-gray-100 dark:border-gray-600">
                            <span class="font-bold text-sm text-gray-700 dark:text-gray-300 uppercase tracking-wide">${dayName}</span>
                            <span class="text-xs text-gray-500 dark:text-gray-400 font-medium mb-1">${dateFormatted}</span>
                            <span class="text-3xl my-1">${icon}</span>
                            <div class="text-sm font-semibold">
                                <span class="text-gray-900 dark:text-white">${maxTemp}°</span>
                                <span class="text-gray-300 dark:text-gray-500 mx-1">|</span>
                                <span class="text-gray-500 dark:text-gray-400">${minTemp}°</span>
                            </div>
                            ${precipDisplay}
                        </div>
                    `;
                }
                
                weatherHTML += '</div>';
                weatherContainer.innerHTML = weatherHTML;

            } catch (error) {
                console.error("Weather fetch failed:", error);
                weatherContainer.innerHTML = `
                    <div class="text-center text-red-500 bg-red-50 dark:bg-red-900/20 p-4 rounded-lg border border-red-200 dark:border-red-800 w-full">
                        Unable to connect to weather service. Firewall may be blocking external API calls.
                    </div>
                `;
            }
        }

        // Render Apps from Registry
        document.addEventListener("DOMContentLoaded", () => {
            const appGrid = document.getElementById('appGrid');
            
            if (typeof appRegistry !== 'undefined') {
                appGrid.innerHTML = '';

                appRegistry.forEach(app => {
                    const cardHTML = `
                        <a href="${app.folder}/index.html" target="_blank" rel="noopener noreferrer" class="block bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 hover-scale">
                            <div class="flex items-center mb-4">
                                <div class="${app.iconBg} p-3 rounded-lg mr-4">
                                    <svg class="w-6 h-6 ${app.iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        ${app.svg}
                                    </svg>
                                </div>
                                <h2 class="text-xl font-bold">${app.name}</h2>
                            </div>
                            <p class="text-gray-600 dark:text-gray-400 text-sm">${app.description}</p>
                        </a>
                    `;
                    appGrid.insertAdjacentHTML('beforeend', cardHTML);
                });
            } else {
                appGrid.innerHTML = `
                    <div class="col-span-full text-center text-red-500 bg-red-50 dark:bg-red-900/20 p-4 rounded-lg border border-red-200 dark:border-red-800">
                        Failed to load the tool registry. Ensure registry.js is configured correctly and in the same folder.
                    </div>
                `;
            }

            // Initialize Dashboard Modules
            updateNetworkStatus();
            fetchWeather();
        });
    </script>
</body>
</html>
