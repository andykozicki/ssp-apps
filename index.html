<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Tool Hub | Sterling Specialty</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M 15 75 A 35 35 0 0 1 85 75%22 fill=%22none%22 stroke=%22%2316a34a%22 stroke-width=%2212%22 stroke-linecap=%22round%22/><circle cx=%2250%22 cy=%2275%22 r=%2210%22 fill=%22%2316a34a%22/><line x1=%2250%22 y1=%2275%22 x2=%2270%22 y2=%2245%22 stroke=%22%2316a34a%22 stroke-width=%228%22 stroke-linecap=%22round%22/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'sterling-green': '#16a34a',
                    },
                    animation: {
                        'breathe': 'breathe 4s ease-in-out infinite',
                    },
                    keyframes: {
                        breathe: {
                            '0%, 100%': { opacity: '0.3', transform: 'scale(0.95)' },
                            '50%': { opacity: '1', transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Strictly adhering to SSP Dark Mode Rules for FOUC prevention
        if (localStorage.getItem('ssp-theme') === 'dark' || !('ssp-theme' in localStorage)) { 
            document.documentElement.classList.add('dark'); 
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <script src="registry.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shine: rgba(0, 0, 0, 0.04);
            --glass-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        html.dark {
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shine: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            transition: background-color 0.5s ease; 
        }

        /* SMART GLASS TILE ENGINE (Sterling Cupertino Variant) */
        .app-tile {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1), border-color 0.3s ease, background 0.3s ease, opacity 0.2s ease;
            cursor: pointer;
        }

        .app-tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                var(--glass-shine), 
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        .app-tile:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(22, 163, 74, 0.3); /* Sterling Green Tint */
            background: html.dark ? rgba(255, 255, 255, 0.04) : rgba(0, 0, 0, 0.05);
            z-index: 20;
        }
        
        .app-tile:hover::before { opacity: 1; }

        /* OVERRIDE TOGGLE UI */
        .toggle-checkbox { left: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .toggle-checkbox:checked { left: 16px; border-color: #16a34a; } 
        .toggle-checkbox:checked + .toggle-label { background-color: #16a34a; box-shadow: 0 0 12px rgba(22, 163, 74, 0.5); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.5); }
    </style>
</head>

                <div class="font-bold border-b border-black/10 dark:border-white/10 pb-2 mb-3 tracking-widest text-sterling-green">DIAGNOSTICS</div>

                <div class="relative inline-block w-8 h-4 align-middle select-none">
                    <input type="checkbox" id="darkModeToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border border-slate-300 dark:border-white/20 appearance-none cursor-pointer z-10 top-0 m-auto"/>
                    <label for="darkModeToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-200 dark:bg-white/5 shadow-inner cursor-pointer transition-all duration-300"></label>

    <div class="flex-1 flex flex-col items-center px-6 w-full pt-16 pb-32 relative z-10">
        
        <header class="mb-16 text-center w-full max-w-6xl">
            <h1 class="text-5xl sm:text-7xl font-light tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-br from-slate-800 to-slate-400 dark:from-white dark:to-slate-500">Clinical Tool Hub</h1>

    <div id="folderModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div id="modalBackdrop" class="absolute inset-0 bg-white/60 dark:bg-black/70 backdrop-blur-md cursor-pointer transition-opacity"></div>
        
        <div id="modalContent" class="relative w-[90%] max-w-2xl bg-white/90 dark:bg-[#0a0a0a]/90 backdrop-blur-3xl border border-black/10 dark:border-white/10 rounded-[2.5rem] shadow-2xl p-8 transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center mb-6 border-b border-black/10 dark:border-white/5 pb-4">
                <h3 id="modalTitle" class="text-2xl font-light tracking-wide text-slate-800 dark:text-white">Folder</h3>
                <button id="closeModalBtn" class="p-2 bg-black/5 hover:bg-black/10 dark:bg-white/5 dark:hover:bg-white/10 rounded-full transition-colors focus:outline-none">

                </button>
            </div>

                </div>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // --- 1. THEME ENGINE ---
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');

        if (htmlElement.classList.contains('dark')) {
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                htmlElement.classList.add('dark');
                localStorage.setItem('ssp-theme', 'dark');
            } else {
                htmlElement.classList.remove('dark');
                localStorage.setItem('ssp-theme', 'light');
            }
        });

        // --- 2. NETWORK SUBSYSTEM ---
        function updateNetworkStatus() {
            const statusText = document.getElementById('net-status-text');
            const pingText = document.getElementById('net-ping-text');
            const statusTip = document.getElementById('net-status-tip');
            const downTip = document.getElementById('net-down-tip');
            const typeTip = document.getElementById('net-type-tip');
            const pingRing = document.getElementById('net-ping-ring');

            if (!navigator.onLine) {
                statusText.textContent = 'NO SIGNAL';
                statusText.className = 'text-red-500 font-bold';
                pingText.textContent = 'Offline';
                pingRing.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.8)] animate-pulse';
                
                statusTip.textContent = 'Offline';
                statusTip.className = 'font-semibold text-red-500';
                downTip.textContent = '0 Mbps';
                typeTip.textContent = 'None';
                return;
            }

            if (navigator.connection) {
                const conn = navigator.connection;
                const rtt = conn.rtt;
                let down = conn.downlink;
                const type = conn.effectiveType;

                const downText = down >= 10 ? '10+ Mbps' : down + ' Mbps';

                statusText.textContent = 'SYS.ONLINE';
                statusText.className = 'text-slate-500 dark:text-slate-400 font-medium';
                pingText.textContent = rtt + ' ms';
                statusTip.textContent = 'Online';
                downTip.textContent = downText;
                typeTip.textContent = type;

                if (rtt > 300 || down < 0.5 || type === '2g' || type === 'slow-2g') {
                    pingRing.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.8)] animate-pulse';
                    statusTip.className = 'font-semibold text-red-500';
                } else if (rtt > 150 || down < 2 || type === '3g') {
                    pingRing.className = 'w-1.5 h-1.5 rounded-full bg-yellow-500 shadow-[0_0_12px_rgba(234,179,8,0.8)] animate-pulse';
                    statusTip.className = 'font-semibold text-yellow-500';
                } else {
                    pingRing.className = 'w-1.5 h-1.5 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-breathe';
                    statusTip.className = 'font-semibold text-green-500';
                }
            } else {
                statusText.textContent = 'SYS.ONLINE';
                statusText.className = 'text-slate-500 dark:text-slate-400 font-medium';
                pingText.textContent = 'Connected';
                pingRing.className = 'w-1.5 h-1.5 rounded-full bg-green-500/80 shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-breathe';
                
                statusTip.textContent = 'Online';
                statusTip.className = 'font-semibold text-green-500';
                downTip.textContent = 'N/A';
                typeTip.textContent = 'N/A';
            }
        }

        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        if (navigator.connection) {
            navigator.connection.addEventListener('change', updateNetworkStatus);
        }

        // --- 3. WEATHER PIPELINE (Updated to Cloudflare Worker) ---
        async function fetchWeather() {
            const weatherContainer = document.getElementById('weatherContainer');
            try {
                // Now targeting the custom worker proxy provided in requirements
                const res = await fetch('https://kzick-weather.askozicki.workers.dev?lat=44.8897&lon=-93.146');
                
                if (!res.ok) throw new Error('Network response was not ok');
                const rawData = await res.json();
                
                // The worker might wrap response in a 'data' object based on Tomorrow.io standard format
                // If it's a direct Open-Meteo proxy, structure remains identical. 
                // We'll handle the Open-Meteo schema as previously written since it matches the UI code.
                const data = rawData.data ? rawData.data : rawData; 
                
                if (!data.current || !data.daily) throw new Error('Invalid Schema');

                const currentTemp = Math.round(data.current.temperature_2m || data.current.temperature || 0);
                const currentCode = data.current.weathercode || data.current.weatherCode || 0;
                
                // Extended code map to safely catch Open-Meteo and Tomorrow.io common codes
                const codeMap = {
                    0: '☀️', 1000: '☀️', 1: '🌤', 1100: '🌤', 2: '⛅', 1101: '⛅', 3: '☁️', 1001: '☁️', 1102: '☁️',
                    45: '🌫️', 2000: '🌫️', 48: '🌫️', 2100: '🌫️',
                    51: '🌧️', 4000: '🌧️', 53: '🌧️', 55: '🌧️', 56: '🌧️', 57: '🌧️',
                    61: '🌧️', 63: '🌧️', 65: '🌧️', 66: '🌧️', 67: '🌧️',
                    71: '❄️', 5000: '❄️', 73: '❄️', 75: '❄️', 77: '❄️',
                    80: '🌦️', 81: '🌦️', 82: '🌦️',
                    85: '❄️', 86: '❄️',
                    95: '⛈️', 8000: '⛈️', 96: '⛈️', 99: '⛈️'
                };
                
                const currentIcon = codeMap[currentCode] || '🌤';

                document.getElementById('miniWeatherIcon').textContent = currentIcon;
                document.getElementById('miniWeatherTemp').textContent = currentTemp + '°';
                document.getElementById('miniWeather').classList.remove('hidden');
                document.getElementById('miniWeather').classList.add('flex');

                let weatherHTML = '<div class="flex flex-col sm:flex-row justify-between gap-4 w-full">';
                
                // Arrays to support both schema types
                const times = data.daily.time || data.daily.map(d => d.time);
                const maxTemps = data.daily.temperature_2m_max || data.daily.map(d => d.temperatureMax);
                const minTemps = data.daily.temperature_2m_min || data.daily.map(d => d.temperatureMin);
                const codes = data.daily.weathercode || data.daily.map(d => d.weatherCode);
                const precips = data.daily.precipitation_probability_max || data.daily.map(d => d.precipitationProbability || 0);

                for (let i = 0; i < 5; i++) {
                    const dateStr = times[i] + (times[i].includes('T') ? '' : 'T00:00:00');
                    const date = new Date(dateStr);
                    
                    let dayName = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                    if (i === 0) dayName = 'TDA';
                    
                    const maxTemp = Math.round(maxTemps[i]);
                    const minTemp = Math.round(minTemps[i]);
                    const code = codes[i];
                    const precipProb = precips[i];
                    
                    const icon = codeMap[code] || '🌤';

                    const precipDisplay = precipProb > 20 
                        ? `<div class="text-[10px] text-blue-500 dark:text-blue-400 font-bold flex items-center mt-2 tracking-widest"><svg class="w-3 h-3 mr-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.5c-3.033 0-5.5-2.467-5.5-5.5 0-2.333 1.583-4.833 5.5-9.833 3.917 5 5.5 7.5 5.5 9.833 0 3.033-2.467 5.5-5.5 5.5z"/></svg>${precipProb}%</div>`
                        : `<div class="text-[10px] opacity-0 mt-2">0%</div>`;

                    weatherHTML += `
                        <div class="flex flex-col items-center flex-1 py-4">
                            <span class="text-xs text-slate-500 uppercase tracking-[0.2em] mb-3">${dayName}</span>
                            <span class="text-3xl mb-3 drop-shadow-md">${icon}</span>
                            <div class="flex items-baseline gap-2 font-mono">
                                <span class="text-lg text-slate-800 dark:text-slate-200 font-medium">${maxTemp}°</span>
                                <span class="text-xs text-slate-400 dark:text-slate-500">${minTemp}°</span>
                            </div>
                            ${precipDisplay}
                        </div>
                    `;
                }
                
                weatherHTML += '</div>';
                weatherContainer.innerHTML = weatherHTML;

            } catch (error) {
                console.error("Weather fetch failed:", error);
                weatherContainer.innerHTML = `<div class="text-red-500 dark:text-red-400 font-bold tracking-widest text-xs">PIPELINE UNREACHABLE</div>`;
            }
        }

        // --- 4. MODAL SUBSYSTEM ---
        const folderData = {
            'links': {
                title: 'System Links',
                links: [
                    { name: 'andykozicki/ssp-apps', url: 'https://github.com/andykozicki/ssp-apps' },
                    { name: 'Kzick Dashboard Repo', url: 'https://github.com/kzick001/dashboard' },
                    { name: 'Weather Worker Pipeline', url: 'https://dash.cloudflare.com/b161c0d78599ee2ead9d5aa4a03d1c40/workers/services/view/kzick-weather/production' },
                    { name: 'Personal Dash Live', url: 'https://kzick001.github.io/dashboard/' }
                ]
            }
        };

        const modal = document.getElementById('folderModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalLinks = document.getElementById('modalLinks');
        
        function openModal(folderId) {
            const data = folderData[folderId];
            if (!data) return;
            
            modalTitle.textContent = data.title;
            modalLinks.innerHTML = data.links.map(link => `
                <a href="${link.url}" target="_blank" class="px-4 py-3 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 bg-black/5 hover:bg-black/10 dark:bg-white/5 dark:hover:bg-white/10 dark:hover:text-white transition-all flex items-center justify-between border border-transparent dark:border-white/5 hover:border-black/10 dark:hover:border-white/20">
                    ${link.name} <span class="text-slate-400 text-xs">↗</span>
                </a>
            `).join('');
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                });
            });
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('modalBackdrop').addEventListener('click', closeModal);

        // --- 5. INITIALIZATION & SMART GLASS LOGIC ---
        function attachSmartGlassListeners() {
            document.querySelectorAll('.app-tile').forEach(tile => {
                tile.addEventListener('mousemove', e => {
                    const rect = tile.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    tile.style.setProperty('--mouse-x', `${x}px`);
                    tile.style.setProperty('--mouse-y', `${y}px`);
                });
            });
        }

        function setupDragAndDrop() {
            const board = document.getElementById('appGrid');
            let draggedItem = null;
            let isDragging = false;

            board.addEventListener('dragstart', e => {
                const tile = e.target.closest('.app-tile');
                if(!tile) return;
                isDragging = true;
                draggedItem = tile;
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', tile.getAttribute('data-id') || 'tile'); 
                setTimeout(() => draggedItem.style.opacity = '0.4', 0);
            });

            board.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });

            board.addEventListener('drop', e => {
                e.preventDefault();
                const targetItem = e.target.closest('.app-tile');
                if (targetItem && draggedItem && targetItem !== draggedItem) {
                    const nodes = Array.from(board.children);
                    const draggedIdx = nodes.indexOf(draggedItem);
                    const targetIdx = nodes.indexOf(targetItem);
                    
                    if (draggedIdx < targetIdx) targetItem.after(draggedItem);
                    else targetItem.before(draggedItem);
                    
                    const newOrder = Array.from(board.children).map(t => t.getAttribute('data-id'));
                    localStorage.setItem('ssp_layout_v1', JSON.stringify(newOrder));
                }
                if(draggedItem) draggedItem.style.opacity = '1';
            });

            board.addEventListener('dragend', () => {
                if(draggedItem) draggedItem.style.opacity = '1';
                draggedItem = null;
                setTimeout(() => { isDragging = false; }, 100);
            });

            window.addEventListener('dragend', () => {
                if(draggedItem) draggedItem.style.opacity = '1';
                draggedItem = null;
                setTimeout(() => { isDragging = false; }, 100);
            });

            // Catch Modal clicks and ignore if dragging
            board.addEventListener('click', e => {
                if (isDragging) return;
                const folderTile = e.target.closest('[data-folder]');
                if (folderTile) {
                    openModal(folderTile.getAttribute('data-folder'));
                }
            });
        }

        function restoreLayout() {
            const savedLayout = localStorage.getItem('ssp_layout_v1');
            if (savedLayout) {
                try {
                    const order = JSON.parse(savedLayout);
                    const board = document.getElementById('appGrid');
                    if(board) {
                        const tiles = Array.from(board.children);
                        const tileMap = {};
                        tiles.forEach(t => tileMap[t.getAttribute('data-id')] = t);
                        
                        order.forEach(id => {
                            if (tileMap[id]) board.appendChild(tileMap[id]);
                        });
                        
                        tiles.forEach(t => {
                            if (!order.includes(t.getAttribute('data-id'))) {
                                board.appendChild(t);
                            }
                        });
                    }
                } catch(e) { console.error("Grid Restore Failed", e); }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const appGrid = document.getElementById('appGrid');
            
            if (typeof appRegistry !== 'undefined') {
                appGrid.innerHTML = '';

                // 1. Inject Registry Tiles
                appRegistry.forEach(app => {
                    const isExternal = app.folder.startsWith('http');
                    const target = isExternal ? 'target="_blank" rel="noopener noreferrer"' : '';
                    const href = isExternal ? app.folder : `${app.folder}/index.html`;

                    const cardHTML = `
                        <a href="${href}" ${target} data-id="${app.id}" draggable="true" class="app-tile group flex flex-col p-6 rounded-[2rem] backdrop-blur-3xl overflow-hidden min-h-[160px]">
                            <div class="flex items-center mb-4 relative z-10">
                                <div class="text-slate-500 dark:text-slate-400 group-hover:text-sterling-green dark:group-hover:text-sterling-green transition-colors duration-500 mr-4">
                                    <svg class="w-8 h-8 drop-shadow-sm" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                        ${app.svg}
                                    </svg>
                                </div>
                                <h2 class="text-xl font-medium tracking-wide text-slate-800 dark:text-slate-200 group-hover:text-black dark:group-hover:text-white transition-colors">${app.name}</h2>
                            </div>
                            <p class="text-slate-500 text-sm font-light relative z-10 leading-relaxed">${app.description}</p>
                        </a>
                    `;
                    appGrid.insertAdjacentHTML('beforeend', cardHTML);
                });

                // 2. Inject Static 'Links' Folder Tile
                const linksTile = `
                    <div data-id="system-links" data-folder="links" draggable="true" class="app-tile group flex flex-col p-6 rounded-[2rem] backdrop-blur-3xl overflow-hidden min-h-[160px] select-none">
                        <div class="flex items-center mb-4 relative z-10 pointer-events-none">
                            <div class="text-slate-500 dark:text-slate-400 group-hover:text-blue-500 transition-colors duration-500 mr-4">
                                <svg class="w-8 h-8 drop-shadow-sm" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"></path></svg>
                            </div>
                            <h2 class="text-xl font-medium tracking-wide text-slate-800 dark:text-slate-200 group-hover:text-black dark:group-hover:text-white transition-colors">System Links</h2>
                        </div>
                        <p class="text-slate-500 text-sm font-light relative z-10 leading-relaxed pointer-events-none">External repositories and infrastructure pipelines.</p>
                    </div>
                `;
                appGrid.insertAdjacentHTML('beforeend', linksTile);

            } else {
                appGrid.innerHTML = `
                    <div class="col-span-full text-center text-red-500 font-mono tracking-widest text-xs p-8 rounded-[2rem] border border-red-500/20 bg-red-500/5">
                        REGISTRY.JS NOT FOUND
                    </div>
                `;
            }

            restoreLayout();
            attachSmartGlassListeners();
            setupDragAndDrop();

            updateNetworkStatus();
            fetchWeather();
        });
    </script>
</body>
</html>
